<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota SMI Tarım · Yönetim Sistemleri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#071a32;--ink-2:#0a2440;--ink-3:#0e2c4f;
  --line:rgba(173,201,234,.13);--line-2:rgba(173,201,234,.22);--line-soft:rgba(173,201,234,.09);
  --text:#eef4fb;--text-dim:#a9bdd6;--text-faint:#6f88a6;
  --gold:#e9b65a;--gold-2:#f1cd86;
  --radius:16px;--font:'Inter',system-ui,-apple-system,sans-serif;--serif:'Playfair Display',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{font-family:var(--font);min-height:100vh;color:#0c2340;background:#ffffff;position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(1100px 560px at 50% -14%,rgba(63,134,214,.07),transparent 60%),radial-gradient(820px 520px at 92% 108%,rgba(70,160,122,.05),transparent 55%)}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background-image:radial-gradient(rgba(12,35,64,.055) 1px,transparent 1px);background-size:30px 30px;-webkit-mask-image:radial-gradient(circle at 50% 22%,#000,transparent 78%);mask-image:radial-gradient(circle at 50% 22%,#000,transparent 78%)}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:30px 24px 70px}
.langbar{display:flex;justify-content:flex-end;margin-bottom:6px}
.lang{display:inline-flex;background:#eef2f7;border:1px solid #dde5ee;border-radius:30px;padding:3px;gap:2px}
.lang button{background:none;border:none;color:#64748b;font:700 11.5px var(--font);letter-spacing:.04em;padding:6px 14px;border-radius:30px;cursor:pointer;transition:.2s}
.lang button.on{background:#0c2340;color:#fff}
.head{text-align:center;margin:14px 0 50px}
.logo-plate{display:inline-flex;background:transparent;padding:0;margin-bottom:22px}
.logo-plate img{width:178px;max-width:60vw;height:auto;display:block}
.wordmark{font-size:12px;font-weight:700;letter-spacing:.34em;text-transform:uppercase;color:#0c2340;padding-left:.34em;margin-bottom:6px}
.wordtag{font-size:12.5px;color:#5b6b80;font-weight:450;margin-bottom:30px}
.slogan{font-family:var(--serif);font-style:italic;font-weight:600;font-size:clamp(15px,3.4vw,37px);line-height:1.2;letter-spacing:.005em;white-space:nowrap;color:#0c2340;margin:0 auto;padding:0 6px}
.slogan-line{width:54px;height:3px;border-radius:3px;background:linear-gradient(90deg,#0c2340,rgba(12,35,64,0));margin:20px auto 0}
.seclabel{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#0c2340;margin:0 0 16px 4px;display:flex;align-items:center;gap:10px}
.seclabel::after{content:"";flex:1;height:1px;background:rgba(12,35,64,.12)}
.apps{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:14px}
.app{--c:var(--text-dim);display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding:19px 20px;text-decoration:none;color:inherit;position:relative;background:linear-gradient(165deg,#2a517a,#1d3f60);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);box-shadow:0 14px 30px -22px rgba(12,35,64,.38);transition:transform .4s cubic-bezier(.16,1,.3,1),border-color .25s,box-shadow .3s;overflow:hidden}
.app::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c);transform:scaleY(0);transform-origin:top;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.app:hover{transform:translateY(-4px);border-color:color-mix(in oklab,var(--c) 55%,transparent);box-shadow:0 24px 46px -20px color-mix(in oklab,var(--c) 50%,#0c2340)}
.app:hover::before{transform:scaleY(1)}
.app-ic{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:color-mix(in oklab,var(--c) 16%,transparent);color:var(--c);flex-shrink:0}
.app-ic svg{width:25px;height:25px;stroke-width:1.9;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.app-body{min-width:0}
.app-body .kicker{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--c);margin-bottom:5px}
.app-body h2{font-size:16.5px;font-weight:700;letter-spacing:-.01em;color:#fff;margin-bottom:4px;line-height:1.2}
.app-body p{font-size:12px;line-height:1.5;color:var(--text-dim)}
.app-go{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);color:var(--text-faint);flex-shrink:0;transition:.3s}
.app-go svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.app:hover .app-go{background:var(--c);color:#fff;transform:translateX(3px)}
.app.soon{cursor:default;opacity:.62}
.app.soon:hover{transform:none;border-color:rgba(255,255,255,.06);box-shadow:0 14px 30px -22px rgba(12,35,64,.38)}
.app.soon:hover::before{transform:scaleY(0)}
.app.soon .app-ic{background:rgba(255,255,255,.04);color:color-mix(in oklab,var(--c) 50%,var(--text-faint))}
.soon-badge{position:absolute;top:13px;right:15px;z-index:2;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);background:rgba(255,255,255,.06);border:1px solid var(--line);padding:4px 10px;border-radius:20px}
.app.meeting{grid-column:1 / -1;--c:#ee8b3c;background:linear-gradient(110deg,#6a4418,#214463 58%);border-color:rgba(238,139,60,.42)}
.app.meeting:hover{background:linear-gradient(110deg,#7c5320,#274d70 58%)}
.app.meeting .app-body h2{font-size:18px}
.vm{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:14px}
details.block{background:linear-gradient(165deg,#2a517a,#1d3f60);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);box-shadow:0 14px 30px -22px rgba(12,35,64,.38);overflow:hidden;transition:border-color .25s}
details.block[open]{border-color:var(--line-2)}
details.block>summary{list-style:none;cursor:pointer;padding:22px 24px;display:block;position:relative}
details.block>summary::-webkit-details-marker{display:none}
.vm-tag{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.vm-tag svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.vz .vm-tag{color:#5aa9e9}.ms .vm-tag{color:#5bbf9a}
.vm-short{font-family:var(--serif);font-style:italic;font-size:16.5px;line-height:1.5;color:#eaf2fb;font-weight:500}
.vm-more{margin-top:14px;font-size:11.5px;font-weight:600;color:var(--text-faint);display:inline-flex;align-items:center;gap:6px;transition:.2s}
.vm-more svg{width:14px;height:14px;transition:transform .3s;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
details[open] .vm-more svg{transform:rotate(180deg)}
details.block .body{padding:0 24px 24px}
details.block .body p{font-size:13px;line-height:1.7;color:var(--text-dim);margin-top:12px}
details.block .body p:first-child{margin-top:0;padding-top:14px;border-top:1px solid var(--line)}
.vals{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(min-width:760px){.vals{grid-template-columns:1fr 1fr 1fr}}
details.val{background:linear-gradient(165deg,#2a517a,#1d3f60);border:1px solid rgba(255,255,255,.06);border-radius:14px;box-shadow:0 12px 26px -20px rgba(12,35,64,.35);overflow:hidden;transition:.25s}
details.val[open]{border-color:var(--line-2);grid-column:1 / -1;background:linear-gradient(165deg,#325d88,#244a6e)}
details.val>summary{list-style:none;cursor:pointer;padding:16px 18px;display:flex;align-items:center;gap:12px}
details.val>summary::-webkit-details-marker{display:none}
.val-ic{width:38px;height:38px;border-radius:10px;background:rgba(233,182,90,.14);color:var(--gold);display:flex;align-items:center;justify-content:center;flex:none}
.val-ic svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.val-t{font-size:14px;font-weight:700;color:#fff;flex:1;line-height:1.25}
.val-chev{width:16px;height:16px;color:var(--text-faint);transition:transform .3s;flex:none;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
details.val[open] .val-chev{transform:rotate(180deg)}
details.val .body{padding:0 18px 18px}
details.val .body p{font-size:12.5px;line-height:1.7;color:var(--text-dim);margin-top:11px}
details.val .body p:first-child{margin-top:0;padding-top:14px;border-top:1px solid var(--line)}
.foot{display:flex;flex-direction:column;align-items:center;gap:7px;margin-top:42px;opacity:.8;transition:opacity .25s}
.foot:hover{opacity:.8}

      'Rota SMI Tarım olarak vizyonumuz, yalnızca bir yem üreticisi olmaktan öte; Türk tarımının omurgasını oluşturan çiftçilerin, besicilerin ve hayvancılık işletmelerinin en güçlü iş ortağı konumuna ulaşmaktır. Bilimsel temelli formülasyonlarımız, titiz kalite süreçlerimiz ve güçlü bayi ağımızla ülkenin her köşesine ulaşan, güvenle tercih edilen bir marka olmayı hedefliyoruz.',
      'Hayvancılık sektörünün verimlilik, sağlık ve sürdürülebilirlik ekseninde dönüştüğü bu dönemde, Rota SMI Tarım bu dönüşümün öncüsü olmak için çalışmaktadır. Yalnızca bugünün değil, yarının da ihtiyaçlarına yanıt verebilen ürün ve hizmet anlayışımızla Türkiye’nin uluslararası hayvancılık arenasındaki rekabet gücüne katkı sağlamak temel hedefimizdir.'
    ],en:[
      'Rota SMI Tarım aspires to be far more than a feed manufacturer — we aim to become the strongest business partner for the farmers, livestock breeders and animal-husbandry enterprises that form the backbone of Turkish agriculture. Through science-based formulations, rigorous quality processes and a broad dealer network reaching every corner of the country, we strive to be a brand chosen with confidence.',
      'As the livestock sector transforms around efficiency, health and sustainability, Rota SMI Tarım works to be a pioneer of this transformation. Our core objective is to contribute to Turkey’s competitiveness in the international livestock arena by meeting not only today’s needs, but tomorrow’s as well.'
    ]}
  },
  misyon:{
    label:{tr:'Misyonumuz',en:'Our Mission'},
    short:{tr:'Hayvancılık sektöründeki her üreticiyi, yüksek kaliteli ve dengeli beslenme değerleriyle destekleyerek hayvan sağlığını ve üretim verimliliğini en üst düzeye çıkarmak.',en:'To maximize animal health and production efficiency by supporting every livestock producer with high-quality, nutritionally balanced feed solutions.'},
    long:{tr:[
      'Rota SMI Tarım’ın misyonu, Türkiye’nin farklı coğrafyalarında faaliyet gösteren küçük ölçekli çiftçiden büyük kapasiteli işletmelere kadar tüm hayvancılık paydaşlarının besleme ihtiyaçlarını en doğru şekilde karşılamaktır. Bunu gerçekleştirirken bilimsel araştırma verilerini, sahadan gelen geri bildirimleri ve güncel besleme teknolojilerini bir araya getirerek üreticinin işini kolaylaştıran, hayvanın yaşam kalitesini artıran ürünler sunmaktayız.',
      'Misyonumuzun merkezinde insan var; yani toprağına, hayvanına ve işine bağlı Anadolu üreticisi. Her ürünümüzü geliştirirken bu insanın gerçek ihtiyaçlarını, ekonomik koşullarını ve beklentilerini gözetiyoruz. Bayilerimizle kurduğumuz derin ilişki ağı sayesinde sadece ürün değil, teknik destek, rehberlik ve süregelen bir ortaklık sunuyoruz. Misyonumuz kısaca şudur: üreticinin kazanması, hayvancılığın güçlenmesi ve Türk tarımının ileri taşınması.'
    ],en:[
      'Rota SMI Tarım’s mission is to meet the nutritional needs of all livestock stakeholders across Turkey — from small-scale farmers to large-capacity enterprises — in the most effective way possible. We combine scientific research data, field feedback and the latest feeding technologies to offer products that simplify the producer’s work and improve animal welfare.',
      'At the heart of our mission is people: the Anatolian producer devoted to their land, animals and work. As we develop every product we consider this person’s real needs, economic conditions and expectations. Through the deep relationship network we build with our dealers, we offer not just products but technical support, guidance and a lasting partnership.'
    ]}

  degerler:[
    {ic:'kalite',title:{tr:'Kalite Güvencesi',en:'Quality Assurance'},
     tr:['Rota SMI Tarım için kalite bir hedef değil, değişmez bir standart ve vazgeçilmez bir taahhüttür. Hammadde seçiminden üretim süreçlerine, paketlemeden dağıtıma kadar her aşamada sektörün gerektirdiği standartların ötesine geçen bir kalite anlayışını benimsiyoruz. Ürünlerimizin her partisi, titiz laboratuvar analizleri ve kalite kontrol prosedürleriyle değerlendirilmekte; sonuçlar sertifikalandırılarak müşterilerimize sunulmaktadır.','Kaliteye duyduğumuz bağlılık, yalnızca fiziksel ürünle sınırlı değildir. Müşteri ilişkilerinde, bayi iletişiminde ve satış sonrası destekte de aynı titizliği göstermekteyiz. Bir Rota SMI ürünü almak; tutarlılığa, güvene ve her seferinde aynı yüksek performansı bekleme hakkına sahip olmak demektir.'],
     en:['Uncompromising standards at every stage of production and service. Every batch is evaluated through rigorous laboratory analyses and quality-control procedures, and results are certified for our customers.']},
    {ic:'yenilik',title:{tr:'Yenilikçilik',en:'Innovation'},
     tr:['Hayvancılık sektörü, bilimsel gelişmeler ve değişen piyasa koşullarıyla sürekli evrilen bir yapıya sahiptir. Rota SMI Tarım bu dinamizmi bir tehdit olarak değil, fırsat olarak görmekte ve yenilikçiliği kurumsal kimliğinin ayrılmaz bir parçası olarak benimsemektedir. Araştırma–geliştirme faaliyetlerimizi kesintisiz sürdürerek ürün portföyümüzü güncel besleme bilimi ışığında yenilemeye ve geliştirmeye devam ediyoruz.','Dijital süreç yönetimi, veri odaklı karar alma ve operasyonel iyileştirme alanlarında da yenilikçiliği benimsiyoruz. Yeniliğin yalnızca ürünle değil, çalışma biçimiyle de ilgili olduğuna inanıyoruz; bu nedenle iç süreçlerimizi, bayi destek modellerimizi ve müşteri deneyimimizi sürekli olarak gözden geçirerek iyileştirmekteyiz.'],
     en:['Continuously evolving products and processes guided by science and market needs. We see change as opportunity and sustain uninterrupted R&D, while embracing data-driven decisions and operational improvement.']},
    {ic:'guven',title:{tr:'Güven ve Şeffaflık',en:'Trust & Transparency'},
     tr:['Güven, Rota SMI Tarım’ın tüm iş ilişkilerinin temel taşıdır. Bayilerimizle, müşterilerimizle, tedarikçilerimizle ve çalışanlarımızla kurduğumuz her ilişkide dürüstlüğü, açıklığı ve hesap verebilirliği ön planda tutarız. Söz verdiğimizde yerine getirir; taahhütlerimizi yazılı ya da sözlü olsun eksiksiz uygularız.','Şeffaflık, yalnızca müşteriye sunulan bilginin doğruluğuyla sınırlı kalmaz. Ürün içeriklerimizi, üretim koşullarımızı ve fiyatlandırma mantığımızı açık bir dille paylaşırız. İş ortaklarımızın aldıkları kararların sağlam temellere dayandığından emin olmalarını sağlamak, kurumsal sorumluluğumuzun bir parçasıdır. Bu değer, aynı zamanda kurum içinde de geçerlidir: ekipler arası açık iletişim, geri bildirimi teşvik eden bir kültür ve hata karşısında dürüst bir tutum benimsiyoruz.'],
     en:['Honest, open and accountable relationships with all stakeholders. We keep our promises, share our product contents, production conditions and pricing logic clearly, and apply the same openness within the company.']},
    {ic:'surdur',title:{tr:'Sürdürülebilirlik',en:'Sustainability'},
     tr:['Tarım ve hayvancılık, doğayla derin bir ilişki içindedir; bu nedenle sürdürülebilirlik Rota SMI Tarım için etik bir zorunluluk olduğu kadar stratejik bir önceliktir. Üretim süreçlerimizde enerji ve kaynak verimliliğini artırmayı, atık üretimini minimize etmeyi ve çevresel ayak izimizi azaltmayı hedefliyoruz. Ürün formülasyonlarımızı geliştirirken yalnızca hayvan sağlığını değil, çevresel sürdürülebilirliği de gözetiriz.','Sürdürülebilirlik anlayışımız çevreyle sınırlı kalmaz; ekonomik ve sosyal boyutları da kapsar. Yerel üreticileri destekleyen tedarik zinciri tercihlerimiz, çalışanlarımıza sunduğumuz istikrarlı ve adil çalışma koşulları ile bayi ağımızın uzun vadeli ekonomik sürdürülebilirliğine yaptığımız katkı, bu değerin somut yansımalarıdır. Bugün doğru olanı yapmak, yarını güvence altına almaktır.'],
     en:['Environmentally conscious production and long-term economic responsibility. We pursue energy and resource efficiency, minimize waste and consider environmental, economic and social dimensions together.']},
    {ic:'musteri',title:{tr:'Müşteri Odaklılık',en:'Customer Focus'},
     tr:['Rota SMI Tarım için müşteri odaklılık bir slogan değil, günlük iş kararlarının çıkış noktasıdır. Ürünlerimizi tasarlarken, fiyatlarımızı belirlerken, lojistik sistemimizi kurarken ve satış sonrası desteğimizi şekillendirirken hep aynı soruyu sorarız: “Üreticinin gerçek ihtiyacı nedir?” Bu sorunun cevabını bulmak için sahada olmayı, dinlemeyi ve anlamayı önceliyoruz.','Müşteri memnuniyetini yalnızca bir satışın tamamlanmasıyla değil, uzun vadeli bir ortaklık ve tekrar eden bir tercihle ölçeriz. Bayilerimiz aracılığıyla son kullanıcıya ulaşırken; hem bayilerimizin hem de nihai müşterinin beklentilerini karşılamakla yükümlüyüz. Bu nedenle şikayetleri fırsat, geri bildirimleri ise değerli bir rehber olarak değerlendiririz.'],
     en:['Every decision anchored in the real needs of producers and partners. We design products, set prices and shape after-sales support by always asking: “what does the producer truly need?”']},
    {ic:'sorumluluk',title:{tr:'Sorumluluk',en:'Responsibility'},
     tr:['Sorumluluk, Rota SMI Tarım’ın bireyden kuruma uzanan bir değer olarak benimsediği bir ilkedir. Her çalışanımız kendi rolünün farkında olarak hareket eder; aldığı kararlara, verdiği sözlere ve yarattığı sonuçlara sahip çıkar. Kurumsal düzeyde ise bu sorumluluk daha geniş bir anlam taşır: Türk hayvancılığına, yerel ekonomiye ve gıda güvenliğine katkı sağlamak.','Sektörde güvenilir bir paydaş olarak bulunmak; ürünlerimizin güvenliğinden, bilgilerimizin doğruluğundan ve faaliyetlerimizin etik sınırlar içinde kalmasından tam anlamıyla sorumlu olmak demektir. Hatalarımızı kabul eder, dersler çıkarır ve daha iyisini yapmak için çalışırız. Bu kurumsal olgunluk, bizi rakiplerimizden ayıran temel özelliklerden biridir.'],
     en:['Full ownership of outcomes, from individual performance to industry contribution. We act with awareness of our role, own our decisions and results, accept our mistakes and work to do better.']},
  ]
};

let LANG='tr';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function svg(p,cls){return `<svg viewBox="0 0 24 24"${cls?' class="'+cls+'"':''}>${p}</svg>`}
function cardHtml(c,extra){
  const inner=`<span class="app-ic">${svg(IC[c.key]||IC.meeting)}</span>
    <span class="app-body"><span class="kicker">${esc(c.kicker[LANG])}</span><h2>${esc(c.title[LANG])}</h2><p>${esc(c.desc[LANG])}</p></span>
    ${c.soon?`<span class="soon-badge">${LANG==='tr'?'Yakında':'Soon'}</span>`:`<span class="app-go" aria-hidden="true">${svg(IC.arrow)}</span>`}`;
  if(c.soon)return `<div class="app soon${extra||''}" style="--c:${c.c}" aria-disabled="true">${inner}</div>`;
  return `<a class="app${extra||''}" style="--c:${c.c}" href="${c.href}">${inner}</a>`;
}
function vmHtml(d,cls){
  return `<details class="block ${cls}"><summary>
      <div class="vm-tag">${svg(cls==='vz'?IC.vz:IC.ms)} ${esc(d.label[LANG])}</div>
      <div class="vm-short">${esc(d.short[LANG])}</div>
      <span class="vm-more">${esc(DATA.ui.more[LANG])} ${svg(IC.chev)}</span>
    </summary><div class="body">${d.long[LANG].map(p=>`<p>${esc(p)}</p>`).join('')}</div></details>`;
}
function valHtml(v){
  return `<details class="val"><summary><span class="val-ic">${svg(VAL_IC[v.ic])}</span><span class="val-t">${esc(v.title[LANG])}</span>${svg(IC.chev,'val-chev')}</summary><div class="body">${v[LANG].map(p=>`<p>${esc(p)}</p>`).join('')}</div></details>`;
}
function render(){
  document.documentElement.lang=LANG;
  document.getElementById('wordmark').textContent=DATA.ui.wordmark[LANG];
  document.getElementById('wordtag').textContent=DATA.ui.wordtag[LANG];
  document.getElementById('slogan').textContent=DATA.slogan[LANG];
  document.getElementById('lbl-apps').textContent=DATA.ui.apps[LANG];
  document.getElementById('lbl-vm').textContent=DATA.ui.vm[LANG];
  document.getElementById('lbl-vals').textContent=DATA.ui.vals[LANG];
  document.getElementById('apps').innerHTML=DATA.cards.map(c=>cardHtml(c)).join('')+cardHtml(DATA.meeting,' meeting');
  document.getElementById('vm').innerHTML=vmHtml(DATA.vizyon,'vz')+vmHtml(DATA.misyon,'ms');
  document.getElementById('vals').innerHTML=DATA.degerler.map(valHtml).join('');
  document.getElementById('lng-tr').classList.toggle('on',LANG==='tr');
  document.getElementById('lng-en').classList.toggle('on',LANG==='en');
}
function setLang(l){LANG=l;try{localStorage.setItem('rota_portal_lang',l)}catch(e){}render();}
try{const s=localStorage.getItem('rota_portal_lang');if(s==='en'||s==='tr')LANG=s;}catch(e){}
render();
</script>
</body>
</html>
