<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#0c2340"><link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"><link rel="icon" type="image/png" href="/icons/icon-192.png"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="Rota SMI">
<title>Bayi & Teknik Danışman · Rota</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue-900:#0C2340;--blue-800:#103561;--blue-700:#174B82;--blue-600:#1D62A8;--blue-500:#2878C8;--blue-400:#4A9AE5;--blue-300:#8DC2F2;--blue-200:#C1DEF7;--blue-100:#E8F1FB;--blue-50:#F3F8FD;
  --slate-900:#0F172A;--slate-800:#1E293B;--slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;--slate-300:#CBD5E1;--slate-200:#E2E8F0;--slate-100:#F1F5F9;--slate-50:#F8FAFC;
  --green-600:#16A34A;--green-100:#DCFCE7;--green-700:#15803D;
  --amber-500:#F59E0B;--amber-100:#FEF3C7;--amber-700:#B45309;
  --red-500:#EF4444;--red-100:#FEE2E2;--red-700:#B91C1C;
  --purple:#7C3AED;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--slate-100);color:var(--slate-800);line-height:1.4}
.hidden{display:none!important}
button,input,select{font-family:inherit}
.num{font-variant-numeric:tabular-nums}
/* topbar */
.topbar{background:#fff;border-bottom:1px solid var(--slate-200);padding:12px 22px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20;flex-wrap:wrap}
.topbar .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
.topbar .brand img{height:34px}
.topbar .brand .t1{font-size:15px;font-weight:700;color:var(--slate-900);line-height:1.1}
.topbar .brand .t2{font-size:11px;color:var(--slate-500)}
.back-link{font-size:12px;color:var(--slate-500);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.back-link:hover{color:var(--blue-600)}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--slate-300);background:#fff;color:var(--slate-700);display:inline-flex;align-items:center;gap:6px;transition:.12s}
.btn:hover{background:var(--slate-50)}
.btn-pri{background:var(--blue-600);color:#fff;border-color:var(--blue-600)}
.btn-pri:hover{background:var(--blue-700)}
.btn-sm{padding:5px 10px;font-size:12px}
/* tabs */
.tabs{background:#fff;border-bottom:1px solid var(--slate-200);padding:0 22px;display:flex;gap:4px;position:sticky;top:59px;z-index:19;overflow-x:auto}
.tab{padding:12px 16px;font-size:13.5px;font-weight:600;color:var(--slate-500);border-bottom:2.5px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:7px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab:hover{color:var(--slate-700)}
.tab.active{color:var(--blue-700);border-bottom-color:var(--blue-600)}
.wrap{max-width:1320px;margin:0 auto;padding:18px 22px 60px}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:13px 16px;border-top:3px solid var(--blue-600)}
.kpi .kl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-500);margin-bottom:6px}
.kpi .kv{font-size:20px;font-weight:700;color:var(--slate-900);line-height:1}
.kpi .ks{font-size:11px;color:var(--slate-500);margin-top:5px}
.kpi.g{border-top-color:var(--green-600)}.kpi.p{border-top-color:var(--purple)}.kpi.a{border-top-color:var(--amber-500)}
/* card */
.card{background:#fff;border:1px solid var(--slate-200);border-radius:11px;margin-bottom:18px;overflow:hidden}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--slate-100);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-hd h3{font-size:14px;font-weight:700;color:var(--slate-800)}
.card-hd .hint{font-size:11px;color:var(--slate-400)}
/* map */
.maplayout{display:grid;grid-template-columns:1fr 330px;gap:18px;align-items:start}
@media(max-width:980px){.maplayout{grid-template-columns:1fr}}
.mapbox{background:#fff;border:1px solid var(--slate-200);border-radius:11px;padding:10px}
.mapwrap{position:relative;width:100%}
svg.trmap{width:100%;height:auto;display:block}
svg.trmap .il{fill:#E2E8F0;stroke:#fff;stroke-width:.6;transition:fill .15s,transform .12s;cursor:pointer}
svg.trmap .il:hover{fill:#CBD5E1}
svg.trmap .il.has{fill:#5B9BD5}
svg.trmap .il.has.t2{fill:#2878C8}svg.trmap .il.has.t3{fill:#1D62A8}svg.trmap .il.has.t4{fill:#103561}
svg.trmap .il.sel{fill:#0C2340!important}
svg.trmap .il:hover{transform:scale(1.05);transform-box:fill-box;transform-origin:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25))}
svg.trmap .mk{pointer-events:none}
svg.trmap .mk circle{fill:#0C2340;stroke:#fff;stroke-width:1.2}
svg.trmap .mk text{fill:#fff;font:700 11px Inter,sans-serif;text-anchor:middle;dominant-baseline:central}
.maptip{position:absolute;background:var(--slate-900);color:#fff;font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px;pointer-events:none;opacity:0;transition:opacity .1s;white-space:nowrap;z-index:5;transform:translate(-50%,-130%)}
.maptip.on{opacity:1}
.maptip .c{color:var(--blue-300);font-weight:700}
.maplegend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 6px 2px;font-size:11.5px;color:var(--slate-500);align-items:center}
.maplegend i{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;margin-right:4px}
/* detay panel */
.detail{background:#fff;border:1px solid var(--slate-200);border-radius:11px;position:sticky;top:120px;overflow:hidden}
.detail-hd{padding:14px 16px;background:var(--blue-900);color:#fff;display:flex;align-items:center;gap:10px}
.detail-hd .dt{font-size:15px;font-weight:700}
.detail-hd .dc{margin-left:auto;font-size:12px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;font-weight:700}
.detail-bd{max-height:440px;overflow-y:auto}
.dealer{padding:12px 16px;border-bottom:1px solid var(--slate-100)}
.dealer:last-child{border-bottom:none}
.dealer .dn{font-size:13.5px;font-weight:700;color:var(--slate-900)}
.dealer .dm{font-size:11.5px;color:var(--slate-500);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.detail-empty{padding:40px 20px;text-align:center;color:var(--slate-400);font-size:13px}
.detail-empty svg{width:40px;height:40px;margin-bottom:10px;color:var(--slate-300)}
/* tablo */
.tbl-scroll{overflow-x:auto}
table.t{border-collapse:collapse;width:100%;min-width:760px;font-size:12.5px}
table.t th,table.t td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--slate-100)}
table.t thead th{background:var(--slate-50);font-size:11px;font-weight:700;color:var(--slate-600);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
table.t tbody tr:hover{background:var(--blue-50)}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.tag-bayi{background:var(--blue-100);color:var(--blue-800)}.tag-dan{background:#EDE9FE;color:var(--purple)}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-on{background:var(--green-100);color:var(--green-700)}.b-off{background:var(--slate-200);color:var(--slate-500)}
.rate{font-weight:700;color:var(--slate-800)}
.lock-note{font-size:11.5px;color:var(--amber-700);background:var(--amber-100);border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.empty{padding:30px;text-align:center;color:var(--slate-400);font-size:13px}
.iconbtn{border:none;background:transparent;cursor:pointer;color:var(--slate-400);padding:3px;border-radius:5px;line-height:0}
.iconbtn:hover{background:var(--slate-100);color:var(--slate-700)}
.iconbtn.del:hover{color:var(--red-700)}
.rowact{display:flex;gap:4px;opacity:0;transition:.1s}
table.t tbody tr:hover .rowact{opacity:1}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;box-shadow:0 30px 70px -20px rgba(0,0,0,.5)}
.modal-hd{padding:16px 22px;border-bottom:1px solid var(--slate-100);display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-bd{padding:18px 22px}.modal-ft{padding:14px 22px;border-top:1px solid var(--slate-100);display:flex;justify-content:flex-end;gap:10px}
.fld{margin-bottom:14px}.fld label{display:block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--slate-500);margin-bottom:5px}
.fld input,.fld select{width:100%;padding:9px 12px;border:1px solid var(--slate-300);border-radius:8px;font-size:13.5px;color:var(--slate-800)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px var(--blue-100)}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.xbtn{border:none;background:transparent;font-size:22px;color:var(--slate-400);cursor:pointer}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--slate-900);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;z-index:200;opacity:0;transition:.25s;pointer-events:none}
.toast.on{opacity:1}

const LSKEY='rota_saha_v1';
let DB={sozlesmeler:[]}, BAYILER=null, tab='harita', selPlate=null, editId=null;

// ---- yardımcı ----
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1900)}
function fmtDate(s){if(!s)return '—';const p=String(s).split('-');if(p.length!==3)return s;return p[2]+'.'+p[1]+'.'+p[0]}
function safeLink(u){u=String(u||'').trim();if(!u)return '';if(!/^https?:\/\//i.test(u))u='https://'+u;return u}
function trUp(s){return String(s||'').replace(/i/g,'İ').replace(/ı/g,'I').toUpperCase()}
function loadSaha(){try{const s=localStorage.getItem(LSKEY);DB=s?JSON.parse(s):{sozlesmeler:[]};}catch(e){DB={sozlesmeler:[]};}DB.sozlesmeler=DB.sozlesmeler||[];}
function saveSaha(){localStorage.setItem(LSKEY,JSON.stringify(DB));}

const ALIAS={'SAVAŞTEPE':'BALIKESİR','ŞAMLI':'BALIKESİR','SAMLI':'BALIKESİR','UZUNKÖPRÜ':'EDİRNE','BİGA':'ÇANAKKALE','ŞİLE':'İSTANBUL','GEBZE':'KOCAELİ','İNEGÖL':'BURSA','GÖNEN':'BALIKESİR','BANDIRMA':'BALIKESİR','BİGADİÇ':'BALIKESİR','KADINHANI':'KONYA','ÇATALCA':'İSTANBUL','GÖRDES':'MANİSA','SİMAV':'KÜTAHYA'};
let NAME2PLATE=null;
function buildName2Plate(){NAME2PLATE={};Object.keys(PROV).forEach(p=>{NAME2PLATE[trUp(PROV[p].ad)]=p});}
function cityToPlate(city){
  if(!NAME2PLATE)buildName2Plate();
  if(!city)return null;
  let first=trUp(String(city).split('/')[0].trim());
  if(NAME2PLATE[first])return NAME2PLATE[first];
  // ilçe ismi mi?
  let parts=String(city).split('/').map(x=>trUp(x.trim()));
  for(const part of parts){if(NAME2PLATE[part])return NAME2PLATE[part];if(ALIAS[part]&&NAME2PLATE[ALIAS[part]])return NAME2PLATE[ALIAS[part]];}
  if(ALIAS[first]&&NAME2PLATE[ALIAS[first]])return NAME2PLATE[ALIAS[first]];
  return null;
}
function bayiList(){return (BAYILER||[]).filter(k=>k.type==='bayi');}
function byPlate(){
  const m={};let unmatched=[];
  bayiList().forEach(b=>{const p=cityToPlate(b.city);if(p){(m[p]=m[p]||[]).push(b);}else if(b.active!==false){unmatched.push(b);}});
  return {m,unmatched};
}

function setTab(t){
  tab=t;
  ['harita','liste','sozlesme'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',t===x));
  document.getElementById('newBtn').style.display=t==='sozlesme'?'':'none';
  render();
}
function render(){
  if(BAYILER===null&&tab!=='sozlesme'){document.getElementById('content').innerHTML='<div class="empty">Sipariş Takip\'ten bayi verisi yükleniyor…</div>';return;}
  if(tab==='harita')return renderHarita();
  if(tab==='liste')return renderListe();
  if(tab==='sozlesme')return renderSozlesme();
}

// ====== HARİTA ======
function renderHarita(){
  const {m,unmatched}=byPlate();
  const ilSayisi=Object.keys(m).length;
  const bayiToplam=bayiList().length;
  const danToplam=(BAYILER||[]).filter(k=>k.type==='danisman').length;
  let h=`<div class="kpis">
    <div class="kpi"><div class="kl">Toplam Bayi</div><div class="kv">${bayiToplam}</div><div class="ks">${ilSayisi} ilde</div></div>
    <div class="kpi p"><div class="kl">Teknik Danışman</div><div class="kv">${danToplam}</div><div class="ks">kayıtlı</div></div>
    <div class="kpi g"><div class="kl">Kapsanan İl</div><div class="kv">${ilSayisi}<span style="font-size:13px;color:var(--slate-400)"> / 81</span></div><div class="ks">bayi olan il</div></div>
    <div class="kpi a"><div class="kl">Eşleşmeyen</div><div class="kv">${unmatched.length}</div><div class="ks">şehri belirsiz</div></div>
  </div>`;
  h+=`<div class="maplayout"><div class="mapbox"><div class="mapwrap" id="mapwrap">${buildSvg(m)}<div class="maptip" id="maptip"></div></div>
    <div class="maplegend"><span><i style="background:#E2E8F0"></i>Bayi yok</span><span><i style="background:#5B9BD5"></i>1</span><span><i style="background:#2878C8"></i>2</span><span><i style="background:#1D62A8"></i>3-4</span><span><i style="background:#103561"></i>5+</span><span style="margin-left:auto;color:var(--slate-400)">İl üzerine gel · tıkla → bayileri gör</span></div>
  </div>
  <div id="detail">${detailHtml(selPlate,m)}</div></div>`;
  if(unmatched.length)h+=`<div class="card"><div class="card-hd"><h3>Şehri Eşleşmeyen Bayiler</h3><span class="hint">Sipariş Takip'te şehir alanını düzeltin</span></div><div style="padding:10px 16px;font-size:12.5px;color:var(--slate-600)">${unmatched.map(b=>`${esc(b.name)} <span style="color:var(--slate-400)">(${esc(b.city||'şehir yok')})</span>`).join(' · ')}</div></div>`;
  document.getElementById('content').innerHTML=h;
  wireMap(m);
}
function tier(n){return n>=5?'t4':n>=3?'t3':n>=2?'t2':''}
function buildSvg(m){
  let paths='',marks='';
  Object.keys(PROV).forEach(p=>{
    const pr=PROV[p];const n=(m[p]||[]).length;
    const cls='il'+(n?' has '+tier(n):'')+(p===selPlate?' sel':'');
    paths+=`<path class="${cls}" data-plate="${p}" data-ad="${esc(pr.ad)}" data-n="${n}" d="${pr.path}"></path>`;
    if(n){const r=n>=5?11:n>=2?9.5:8.5;marks+=`<g class="mk"><circle cx="${pr.cx}" cy="${pr.cy}" r="${r}"></circle><text x="${pr.cx}" y="${pr.cy}">${n}</text></g>`;}
  });
  return `<svg class="trmap" viewBox="0 0 1000 422" xmlns="http://www.w3.org/2000/svg">${paths}${marks}</svg>`;
}
function wireMap(m){
  const tip=document.getElementById('maptip');const wrap=document.getElementById('mapwrap');
  wrap.querySelectorAll('path.il').forEach(el=>{
    el.addEventListener('mousemove',e=>{const r=wrap.getBoundingClientRect();tip.style.left=(e.clientX-r.left)+'px';tip.style.top=(e.clientY-r.top)+'px';const n=+el.dataset.n;tip.innerHTML=esc(el.dataset.ad)+(n?` · <span class="c">${n} bayi</span>`:' · bayi yok');tip.classList.add('on');el.parentNode.appendChild(el);});
    el.addEventListener('mouseleave',()=>tip.classList.remove('on'));
    el.addEventListener('click',()=>{selPlate=el.dataset.plate;renderHarita();});
  });
}
function detailHtml(plate,m){
  if(!plate||!m[plate]||!m[plate].length){
    return `<div class="detail"><div class="detail-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg><div>Haritadan bir il seçin,<br>oradaki bayileri görün.</div></div></div>`;
  }
  const list=m[plate];
  return `<div class="detail"><div class="detail-hd"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg><span class="dt">${esc(PROV[plate].ad)}</span><span class="dc">${list.length} bayi</span></div>
    <div class="detail-bd">${list.map(b=>`<div class="dealer"><div class="dn">${esc(b.name)}</div><div class="dm">
      <span class="tag tag-bayi">BAYİ</span>
      ${b.rate?`<span class="rate">%${esc(b.rate)} iskonto</span>`:''}
      ${b.city?`<span>📍 ${esc(b.city)}</span>`:''}
      ${b.phone?`<span>📞 ${esc(b.phone)}</span>`:''}
      <span class="badge ${b.active!==false?'b-on':'b-off'}">${b.active!==false?'Aktif':'Pasif'}</span>
    </div></div>`).join('')}</div></div>`;
}

// ====== BAYİ & DANIŞMAN LİSTESİ (salt-okunur, senkron) ======
function renderListe(){
  const arr=[...(BAYILER||[])].sort((a,b)=>(a.type===b.type?0:a.type==='bayi'?-1:1)||0);
  const bayi=arr.filter(k=>k.type==='bayi'),dan=arr.filter(k=>k.type==='danisman');
  let h=`<div class="lock-note"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Bu liste <b>Sipariş Takip → Bayi &amp; Danışman</b> bölümünden otomatik gelir. Buradan düzenlenemez; değişiklik Sipariş Takip'ten yapılır ve anında buraya yansır.</div>`;
  h+=`<div class="card"><div class="card-hd"><h3>Bayi &amp; Danışman Listesi</h3><span class="hint">${bayi.length} bayi · ${dan.length} danışman</span></div>
    <div class="tbl-scroll"><table class="t"><thead><tr><th>Ad</th><th>Tip</th><th>Şehir</th><th>Oran</th><th>Telefon</th><th>Durum</th></tr></thead><tbody>`;
  if(!arr.length)h+=`<tr><td colspan="6" class="empty">Kayıt yok.</td></tr>`;
  arr.forEach(k=>{h+=`<tr>
    <td><b>${esc(k.name)}</b></td>
    <td><span class="tag ${k.type==='bayi'?'tag-bayi':'tag-dan'}">${k.type==='bayi'?'BAYİ':'DANIŞMAN'}</span></td>
    <td>${esc(k.city||'—')}</td>
    <td>${k.rate?`<span class="rate">%${esc(k.rate)} iskonto</span>`:'<span style="color:var(--slate-400)">—</span>'}</td>
    <td>${esc(k.phone||'—')}</td>
    <td><span class="badge ${k.active!==false?'b-on':'b-off'}">${k.active!==false?'Aktif':'Pasif'}</span></td>
  </tr>`;});
  h+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=h;
}

// ====== SÖZLEŞMELER (link tabanlı) ======
function pdfBtn(link){const u=safeLink(link);return u?`<a class="btn btn-sm" href="${esc(u)}" target="_blank" rel="noopener" style="text-decoration:none;white-space:nowrap"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>Aç</a>`:'<span style="color:var(--slate-400);font-size:11px">link yok</span>'}
function renderSozlesme(){
  const list=[...DB.sozlesmeler].sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||''));
  let h=`<div class="card"><div class="card-hd"><h3>Bayi &amp; Danışman Sözleşmeleri</h3><span class="hint">İmzalı sözleşmeleri tarayıp Drive linkini ekleyin</span></div>`;
  if(!list.length){h+=`<div class="empty">Henüz sözleşme yok. Sağ üstten <b>+ Sözleşme Ekle</b> ile bayi/danışman sözleşmelerinin PDF linkini ekleyin.<br><span style="font-size:11.5px">İmzalı sözleşmeyi tarayıp Google Drive'a yükleyin, paylaşım linkini buraya yapıştırın.</span></div></div>`;document.getElementById('content').innerHTML=h;return;}
  h+=`<div class="tbl-scroll"><table class="t"><thead><tr><th>Taraf (Bayi/Danışman)</th><th>Tip</th><th>Konu</th><th>Tarih</th><th>PDF</th><th></th></tr></thead><tbody>`;
  list.forEach(s=>{h+=`<tr>
    <td><b>${esc(s.taraf||'—')}</b>${s.not?`<div style="font-size:11px;color:var(--slate-500)">${esc(s.not)}</div>`:''}</td>
    <td><span class="tag ${s.tip==='danisman'?'tag-dan':'tag-bayi'}">${s.tip==='danisman'?'DANIŞMAN':'BAYİ'}</span></td>
    <td>${esc(s.baslik||'')}</td>
    <td class="num">${s.tarih?fmtDate(s.tarih):'—'}</td>
    <td>${pdfBtn(s.link)}</td>
    <td><div class="rowact">
      <button class="iconbtn" onclick="openSozlesme('${s.id}')" title="Düzenle"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg></button>
      <button class="iconbtn del" onclick="delSozlesme('${s.id}')" title="Sil"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
    </div></td></tr>`;});
  h+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=h;
}
function openSozlesme(id){
  const s=id?DB.sozlesmeler.find(x=>x.id===id):{taraf:'',tip:'bayi',baslik:'',tarih:'',link:'',not:''};
  if(!s)return;editId=id||null;
  const adlar=[...new Set((BAYILER||[]).map(k=>k.name))].sort((a,b)=>a.localeCompare(b,'tr'));
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-hd"><h3>${id?'Sözleşme Düzenle':'Yeni Sözleşme'}</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd">
      <div class="fld-row">
        <div class="fld"><label>Taraf (Bayi / Danışman)</label><input id="z_taraf" list="bayiList" value="${esc(s.taraf||'')}" placeholder="Örn. ADEM ŞENGÜN"><datalist id="bayiList">${adlar.map(a=>`<option value="${esc(a)}">`).join('')}</datalist></div>
        <div class="fld"><label>Tip</label><select id="z_tip"><option value="bayi" ${s.tip!=='danisman'?'selected':''}>Bayi</option><option value="danisman" ${s.tip==='danisman'?'selected':''}>Teknik Danışman</option></select></div>
      </div>
      <div class="fld-row">
        <div class="fld"><label>Konu / Başlık</label><input id="z_baslik" value="${esc(s.baslik||'')}" placeholder="Örn. Bayilik sözleşmesi"></div>
        <div class="fld"><label>İmza Tarihi</label><input type="date" id="z_tarih" value="${esc(s.tarih||'')}"></div>
      </div>
      <div class="fld"><label>PDF Linki (taranmış sözleşme · Drive vb.)</label><input id="z_link" value="${esc(s.link||'')}" placeholder="https://drive.google.com/..."></div>
      <div class="fld"><label>Not</label><input id="z_not" value="${esc(s.not||'')}" placeholder="İsteğe bağlı"></div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Vazgeç</button><button class="btn btn-pri" onclick="saveSozlesme()">Kaydet</button></div>
  </div></div>`;
  setTimeout(()=>document.getElementById('z_taraf').focus(),30);
}
function saveSozlesme(){
  const g=id=>document.getElementById(id).value.trim();
  const o={taraf:g('z_taraf'),tip:g('z_tip'),baslik:g('z_baslik'),tarih:g('z_tarih'),link:safeLink(g('z_link')),not:g('z_not')};
  if(!o.taraf&&!o.baslik){toast('Taraf veya konu girin');return}
  if(editId){Object.assign(DB.sozlesmeler.find(x=>x.id===editId),o);toast('Sözleşme güncellendi');}
  else{DB.sozlesmeler.push({id:'z'+Math.random().toString(36).slice(2,8),...o});toast('Sözleşme eklendi');}
  saveSaha();closeModal();render();
}
function delSozlesme(id){const s=DB.sozlesmeler.find(x=>x.id===id);if(!s)return;if(!confirm('Bu sözleşme silinsin mi?\n\n'+(s.taraf||'')+' · '+(s.baslik||'')))return;DB.sozlesmeler=DB.sozlesmeler.filter(x=>x.id!==id);saveSaha();render();toast('Sözleşme silindi');}
function closeModal(){document.getElementById('modalRoot').innerHTML='';editId=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// dış katmanlardan çağrılır
window.__setBayiler=function(arr){BAYILER=arr||[];if(tab!=='sozlesme')render();};
window.__reloadSaha=function(){const t=tab;loadSaha();tab=t;render();};
loadSaha();render();
</script>

<!-- Firebase: Sipariş Takip'ten bayi (salt-okunur) + Saha sözleşme senkronu -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyB-eY1jv-HYfrNxzrhWS9sywLBFQarpLD8",authDomain:"rota-yem.firebaseapp.com",projectId:"rota-yem",storageBucket:"rota-yem.firebasestorage.app",messagingSenderId:"186408871052",appId:"1:186408871052:web:65791c132b2c1b525307a9"};
const fbApp=initializeApp(firebaseConfig),fdb=getFirestore(fbApp);
let dotEl=null;function fbDot(c,t){if(!dotEl){dotEl=document.createElement('div');dotEl.style.cssText='position:fixed;bottom:12px;left:12px;z-index:999;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:4px 10px;font:600 11px Inter,system-ui,sans-serif;color:#475569;box-shadow:0 2px 8px rgba(0,0,0,.1)';document.body.appendChild(dotEl);}dotEl.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${c}"></span> ${t}`;}

// 1) Sipariş Takip bayileri (salt-okunur)
const sref=doc(fdb,"apps","siparis");
function extractBayiler(d){
  try{const raw=d&&d.data&&d.data['rota_so_v1'];if(!raw)return [];const o=JSON.parse(raw);return (o.komisyoncular||[]).map(k=>({name:k.name,type:k.type,city:k.city||'',rate:k.rate||0,phone:k.phone||'',active:k.active!==false}));}catch(e){console.warn('bayi parse',e);return [];}
}
fbDot('#F59E0B','Bağlanıyor');
(async function(){
  try{const snap=await getDoc(sref);window.__setBayiler(snap.exists()?extractBayiler(snap.data()):[]);fbDot('#16A34A','Senkron');}
  catch(e){console.warn('siparis read',e);window.__setBayiler([]);fbDot('#EF4444','Çevrimdışı');}
  try{onSnapshot(sref,(snap)=>{if(snap.exists()){window.__setBayiler(extractBayiler(snap.data()));fbDot('#16A34A','Güncellendi');}});}catch(e){}
})();

// 2) Saha sözleşmeleri (senkron - bakim ile aynı desen)
const zref=doc(fdb,"apps","saha");
function isKey(k){return !!k&&k.indexOf('rota_saha')===0}
function collectLocal(){const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(isKey(k))o[k]=localStorage.getItem(k);}return o;}
let suppress=false,lastUpdated=0,timer=null,hydrated=false;
const _set=localStorage.setItem.bind(localStorage);
localStorage.setItem=function(k,v){_set(k,v);if(!suppress&&isKey(k))schedulePush();};
function schedulePush(){if(!hydrated)return;clearTimeout(timer);timer=setTimeout(push,900);}
async function push(){try{lastUpdated=Date.now();await setDoc(zref,{data:collectLocal(),updated:lastUpdated});}catch(e){console.warn('saha push',e);}}
function applyRemote(d){suppress=true;try{Object.keys(d||{}).forEach(k=>{if(isKey(k))_set(k,d[k]);});}finally{suppress=false;}}
(async function(){
  try{const snap=await getDoc(zref);
    if(snap.exists()&&snap.data().data){applyRemote(snap.data().data);lastUpdated=snap.data().updated||0;hydrated=true;if(window.__reloadSaha)window.__reloadSaha();}
    else{hydrated=true;}
  }catch(e){console.warn('saha init',e);}
  try{onSnapshot(zref,(snap)=>{if(!snap.exists())return;const d=snap.data();if(!d||(d.updated&&d.updated===lastUpdated))return;lastUpdated=d.updated||0;hydrated=true;applyRemote(d.data);if(window.__reloadSaha)window.__reloadSaha();});}catch(e){}
})();
</script>
