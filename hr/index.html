<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#0c2340"><link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"><link rel="icon" type="image/png" href="/icons/icon-192.png"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="Rota SMI">
<title>İnsan Kaynakları · Rota</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --blue-900:#0C2340;--blue-800:#103561;--blue-700:#174B82;--blue-600:#1D62A8;--blue-500:#2878C8;--blue-400:#4A9AE5;--blue-300:#8DC2F2;--blue-200:#C1DEF7;--blue-100:#E8F1FB;--blue-50:#F3F8FD;
  --slate-900:#0F172A;--slate-800:#1E293B;--slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;--slate-300:#CBD5E1;--slate-200:#E2E8F0;--slate-100:#F1F5F9;--slate-50:#F8FAFC;
  --green-600:#16A34A;--green-100:#DCFCE7;--green-700:#15803D;--green-50:#F0FDF4;
  --amber-500:#F59E0B;--amber-100:#FEF3C7;--amber-700:#B45309;--amber-50:#FFFBEB;
  --red-500:#EF4444;--red-100:#FEE2E2;--red-700:#B91C1C;--red-50:#FEF2F2;
  --purple:#7C3AED;--wa:#25D366;--wa-d:#128C7E;
  --sb:236px;--font:'Inter',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--slate-100);color:var(--slate-800);line-height:1.4}
.hidden{display:none!important}
button,input,select,textarea{font-family:inherit}
.num{font-variant-numeric:tabular-nums}
/* sidebar */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sb);background:var(--blue-900);color:#cdddf0;display:flex;flex-direction:column;z-index:30;transition:transform .25s}
.sb-brand{padding:16px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand .plate{background:#fff;border-radius:8px;padding:5px 8px;display:inline-flex}
.sb-brand .plate img{height:24px;display:block}
.sb-brand .bt{font-size:13px;font-weight:700;color:#fff;line-height:1.1}
.sb-brand .bs{font-size:10px;color:#7e9bbd}
.sb-nav{flex:1;overflow-y:auto;padding:10px 10px 20px}
.sb-sec{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#5e7da3;padding:14px 12px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13.5px;font-weight:500;color:#cdddf0;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:.12s}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:var(--blue-600);color:#fff;font-weight:600}
.sb-item svg{width:17px;height:17px;flex:none;opacity:.9}
.sb-item .badge{margin-left:auto;font-size:10px;font-weight:700;background:rgba(255,255,255,.14);color:#cdddf0;padding:1px 7px;border-radius:20px}
.sb-back{padding:12px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#7e9bbd;text-decoration:none;display:flex;align-items:center;gap:6px}
.sb-back:hover{color:#fff}
/* main */
.main{margin-left:var(--sb);min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--slate-200);padding:13px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.topbar .ttl{font-size:18px;font-weight:800;color:var(--slate-900)}
.topbar .sub{font-size:12px;color:var(--slate-500)}
.hamb{display:none;background:none;border:none;cursor:pointer;color:var(--slate-700)}
.spacer{margin-left:auto}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--slate-300);background:#fff;color:var(--slate-700);display:inline-flex;align-items:center;gap:6px;transition:.12s}
.btn:hover{background:var(--slate-50)}
.btn-pri{background:var(--blue-600);color:#fff;border-color:var(--blue-600)}.btn-pri:hover{background:var(--blue-700)}
.btn-wa{background:var(--wa);color:#fff;border-color:var(--wa)}.btn-wa:hover{background:var(--wa-d)}
.btn-sm{padding:5px 10px;font-size:12px}
.wrap{padding:22px 24px 60px;max-width:1200px}
/* kpi */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:14px 16px;border-top:3px solid var(--blue-600)}
.kpi .kl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-500);margin-bottom:7px}
.kpi .kv{font-size:21px;font-weight:700;color:var(--slate-900);line-height:1}
.kpi .ks{font-size:11px;color:var(--slate-500);margin-top:5px}
.kpi.g{border-top-color:var(--green-600)}.kpi.a{border-top-color:var(--amber-500)}.kpi.p{border-top-color:var(--purple)}
/* card */
.card{background:#fff;border:1px solid var(--slate-200);border-radius:11px;margin-bottom:18px;overflow:hidden}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--slate-100);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-hd h3{font-size:14px;font-weight:700;color:var(--slate-800)}
.card-hd .hint{font-size:11.5px;color:var(--slate-400)}
.intro{font-size:12.5px;color:var(--slate-500);margin:-4px 0 14px;line-height:1.55}
/* table */
.tbl-scroll{overflow-x:auto}
table.t{border-collapse:collapse;width:100%;min-width:680px;font-size:12.5px}
table.t th,table.t td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--slate-100);vertical-align:middle}
table.t thead th{background:var(--slate-50);font-size:11px;font-weight:700;color:var(--slate-600);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
table.t tbody tr:hover{background:var(--blue-50)}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.t-ure{background:#FEF3C7;color:#B45309}.t-ida{background:var(--blue-100);color:var(--blue-800)}.t-paz{background:#EDE9FE;color:var(--purple)}.t-dig{background:var(--slate-200);color:var(--slate-600)}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-on{background:var(--green-100);color:var(--green-700)}.b-off{background:var(--slate-200);color:var(--slate-500)}
.rowact{display:flex;gap:4px;opacity:0;transition:.1s}
table.t tbody tr:hover .rowact{opacity:1}
.iconbtn{border:none;background:transparent;cursor:pointer;color:var(--slate-400);padding:4px;border-radius:5px;line-height:0}
.iconbtn:hover{background:var(--slate-100);color:var(--slate-700)}.iconbtn.del:hover{color:var(--red-700)}
.empty{padding:30px;text-align:center;color:var(--slate-400);font-size:13px}
.pdfbtn{border:1px solid var(--slate-300);background:#fff;color:var(--slate-700);font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.pdfbtn:hover{background:var(--slate-50)}
/* template */
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.tmpl{background:#fff;border:1px solid var(--slate-200);border-radius:11px;padding:16px;display:flex;flex-direction:column;gap:9px}
.tmpl .tt{font-size:14px;font-weight:700;color:var(--slate-900)}
.tmpl .tm{font-size:11.5px;color:var(--slate-500);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tmpl .ta{display:flex;gap:6px;flex-wrap:wrap}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--slate-100);color:var(--slate-600)}
/* placeholder */
.ph{text-align:center;padding:54px 24px;color:var(--slate-500)}
.ph .pic{width:66px;height:66px;border-radius:16px;background:var(--blue-50);color:var(--blue-500);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.ph .pic svg{width:34px;height:34px}
.ph h2{font-size:19px;font-weight:700;color:var(--slate-800);margin-bottom:8px}
.ph p{font-size:13px;max-width:520px;margin:0 auto 6px;line-height:1.6}
.ph .plist{text-align:left;max-width:460px;margin:14px auto 0;font-size:12.5px;color:var(--slate-600)}
.ph .plist li{margin:5px 0}
.ph .soon{display:inline-block;margin-top:16px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber-700);background:var(--amber-100);padding:5px 14px;border-radius:20px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:34px 18px;overflow-y:auto}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;box-shadow:0 30px 70px -20px rgba(0,0,0,.5)}
.modal.lg{max-width:820px}
.modal-hd{padding:16px 22px;border-bottom:1px solid var(--slate-100);display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-bd{padding:18px 22px;max-height:70vh;overflow-y:auto}.modal-ft{padding:14px 22px;border-top:1px solid var(--slate-100);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.fld{margin-bottom:14px}.fld label{display:block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--slate-500);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 12px;border:1px solid var(--slate-300);border-radius:8px;font-size:13.5px;color:var(--slate-800)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px var(--blue-100)}
.fld textarea{resize:vertical;min-height:60px;line-height:1.55}
.fld textarea.code{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;min-height:300px}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.xbtn{border:none;background:transparent;font-size:22px;color:var(--slate-400);cursor:pointer}
.mergebar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.mergebar button{font-size:11px;font-weight:600;border:1px solid var(--blue-200);background:var(--blue-50);color:var(--blue-700);padding:4px 9px;border-radius:6px;cursor:pointer}
.mergebar button:hover{background:var(--blue-100)}
.helptext{font-size:11.5px;color:var(--slate-500);margin-top:6px}
/* puantaj */
.brush{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.brush .bl{font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.brush button{font-size:11.5px;font-weight:700;border:2px solid transparent;border-radius:7px;padding:5px 11px;cursor:pointer}
.brush button.on{border-color:var(--slate-900);box-shadow:0 0 0 2px #fff inset}
.pz-scroll{overflow:auto;max-height:72vh;border:1px solid var(--slate-200);border-radius:10px}
table.pz{border-collapse:separate;border-spacing:0;font-size:11px}
table.pz th,table.pz td{border-right:1px solid var(--slate-200);border-bottom:1px solid var(--slate-200);padding:4px 5px;text-align:center;white-space:nowrap}
table.pz thead th{background:var(--slate-100);font-weight:700;font-size:10px;color:var(--slate-600);position:sticky;top:0;z-index:2}
table.pz thead tr:nth-child(2) th{top:23px}
table.pz td.nm,table.pz th.nm{text-align:left;position:sticky;left:0;background:#fff;z-index:1;font-weight:600;min-width:148px;box-shadow:1px 0 0 var(--slate-200)}
table.pz th.nm{background:var(--slate-100);z-index:4}
table.pz td.sno{position:sticky;left:0;background:#fff}
table.pz td.day{cursor:pointer;font-weight:700;min-width:24px}
table.pz td.day:hover{outline:2px solid var(--blue-400);outline-offset:-2px}
table.pz td.sum{font-weight:700;background:var(--slate-50)}
.pz-X{background:#E9F8EF;color:#15803D}.pz-HT{background:#F1F5F9;color:#94A3B8}.pz-GT{background:#EDE9FE;color:#7C3AED}
.pz-YI{background:#E8F1FB;color:#1D62A8}.pz-UI{background:#FEF3C7;color:#B45309}.pz-R{background:#FEE2E2;color:#B91C1C}.pz-M{background:#CFFAFE;color:#0E7490}.pz-E{color:#cbd5e1}
table.pz td.wend{background:#fafbfc}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--slate-900);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;z-index:200;opacity:0;transition:.25s;pointer-events:none}
.toast.on{opacity:1}
.sb-ov{display:none}
@media(max-width:880px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}
  .main{margin-left:0}.hamb{display:inline-flex}
  .sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:29}.sb-ov.on{display:block}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2000)}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDate(s){if(!s)return '';const p=String(s).split('-');if(p.length!==3)return s;return p[2]+'.'+p[1]+'.'+p[0]}
function parseISO(s){if(!s)return null;const p=String(s).split('-').map(Number);if(p.length!==3)return null;return new Date(p[0],p[1]-1,p[2])}
function gunFarki(a,b){const d1=parseISO(a),d2=parseISO(b);if(!d1||!d2)return '';return Math.max(0,Math.round((d2-d1)/864e5)+1)}
function yilFark(iso,ref){const d=parseISO(iso);if(!d)return 0;const r=ref?parseISO(ref):new Date();let y=r.getFullYear()-d.getFullYear();const m=r.getMonth()-d.getMonth();if(m<0||(m===0&&r.getDate()<d.getDate()))y--;return y}
// 4857/53: 1-5yıl=14, 5-15=20, 15+=26; 18 altı/50+ en az 20
function yillikHakGun(iseGiris,dogum,refISO){const k=yilFark(iseGiris,refISO);if(k<1)return 0;let g=k<=5?14:(k<15?20:26);if(dogum){const yas=yilFark(dogum,refISO);if(yas<18||yas>=50)g=Math.max(g,20);}return g}
function sonrakiHakEdis(iseGiris,dogum){const d=parseISO(iseGiris);if(!d)return null;const t=new Date();t.setHours(0,0,0,0);let yil=t.getFullYear();let nx=new Date(yil,d.getMonth(),d.getDate());if(nx<=t)nx=new Date(yil+1,d.getMonth(),d.getDate());const refISO=nx.getFullYear()+'-'+String(nx.getMonth()+1).padStart(2,'0')+'-'+String(nx.getDate()).padStart(2,'0');return {tarih:refISO,gun:yillikHakGun(iseGiris,dogum,refISO)}}
function aylarArasi(a,b){const d1=parseISO(a),d2=parseISO(b);if(!d1||!d2)return 0;let m=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth());if(d2.getDate()<d1.getDate())m--;return Math.max(0,m)}
function kidemMetin(iseGiris,refISO){const m=aylarArasi(iseGiris,refISO);const y=Math.floor(m/12),ay=m%12;const parts=[];if(y)parts.push(y+' yıl');if(ay)parts.push(ay+' ay');return parts.length?parts.join(' '):'1 aydan az'}
function isgunuSay(fromISO,toISO){const d=parseISO(fromISO),e=parseISO(toISO);if(!d||!e)return 0;let c=0;const x=new Date(d);x.setDate(x.getDate()+1);while(x<=e){const g=x.getDay();if(g>=1&&g<=5)c++;x.setDate(x.getDate()+1);}return c}
// 4857/17: <6ay=2hf, 6ay-1.5yıl=4hf, 1.5-3yıl=6hf, 3yıl+=8hf · md.27: günde min 2 saat iş arama izni
function ihbarHesapla(iseGiris,fesihISO){
  const ref=fesihISO||todayISO();const m=aylarArasi(iseGiris,ref);
  let hafta=m<6?2:m<18?4:m<36?6:8;
  const ihbarGun=hafta*7;const bitis=parseISO(ref);bitis.setDate(bitis.getDate()+ihbarGun);
  const bitisISO=bitis.getFullYear()+'-'+String(bitis.getMonth()+1).padStart(2,'0')+'-'+String(bitis.getDate()).padStart(2,'0');
  const isgunu=isgunuSay(ref,bitisISO);const isArama=isgunu*2;
  return {ay:m,kidem:kidemMetin(iseGiris,ref),hafta,ihbarGun,baslangic:ref,bitis:bitisISO,isgunu,isAramaSaat:isArama};
}

    </div></td></tr>`;});
  h+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=h;
}
function openPersonel(id){

function savePersonel(){
  const g=id=>document.getElementById(id).value.trim();
  const o={ad:g('p_ad'),tc:g('p_tc'),departman:g('p_dep'),gorev:g('p_gorev'),durum:g('p_durum'),iseGiris:g('p_giris'),dogum:g('p_dogum'),telefon:g('p_tel'),ucret:g('p_ucret'),iban:g('p_iban'),adres:g('p_adres')};
  if(!o.ad){toast('Ad Soyad gerekli');return}
  if(editId)Object.assign(DB.personeller.find(x=>x.id===editId),o);else DB.personeller.push({id:uid('p'),...o});

}
function delPersonel(id){const p=DB.personeller.find(x=>x.id===id);if(!p)return;if(!confirm(p.ad+' silinsin mi?'))return;DB.personeller=DB.personeller.filter(x=>x.id!==id);saveDB();render();toast('Silindi');}

// ============ ŞABLON / SÖZLEŞME MOTORU ============
function renderSablon(){
  const ss=DB.sablonlar;
  let h=`<p class="intro">Matbu sözleşme/evrak metinlerini buraya bir kez girin, içine <code>{{ad_soyad}}</code> gibi alanlar koyun. Personel seçtiğinizde alanlar otomatik dolar, yazdırabilirsiniz. Üretim/İdari/Pazarlama için farklı şablonlar tutabilirsiniz. Metni düzenleyip kaydederek kendi formatınızı oluşturursunuz.</p>`;
  if(!ss.length){h+=`<div class="card"><div class="empty">Henüz şablon yok. <b>+ Yeni Şablon</b> ile başlayın.</div></div>`;document.getElementById('content').innerHTML=h;return;}
  h+=`<div class="tmpl-grid">`;
  ss.forEach(s=>{h+=`<div class="tmpl">
    <div class="chips"><span class="chip">${esc(s.kategori||'Diğer')}</span><span class="chip">${esc(s.rol||'Genel')}</span></div>
    <div class="tt">${esc(s.ad)}</div>
    <div class="tm">${esc((s.icerik||'').replace(/\n/g,' ').slice(0,120))}…</div>
    <div class="ta">
      <button class="btn btn-sm btn-pri" onclick="olusturFromSablon('${s.id}')">Oluştur</button>
      <button class="btn btn-sm" onclick="openSablon('${s.id}')">Düzenle</button>
      <button class="btn btn-sm" onclick="dupSablon('${s.id}')">Kopyala</button>
      <button class="btn btn-sm" onclick="delSablon('${s.id}')" style="color:var(--red-700)">Sil</button>
    </div>
  </div>`;});
  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}
function openSablon(id){
  const s=id?DB.sablonlar.find(x=>x.id===id):{ad:'',kategori:'İş Sözleşmesi',rol:'Genel',icerik:''};
  if(!s)return;editId=id||null;
  const merge=MERGE.map(m=>`<button type="button" onclick="insertMerge('${m.k}')">${m.l}</button>`).join('');
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal lg">
    <div class="modal-hd"><h3>${id?'Şablon Düzenle':'Yeni Şablon'}</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd">
      <div class="fld-row3">
        <div class="fld"><label>Şablon Adı</label><input id="s_ad" value="${esc(s.ad||'')}" placeholder="Örn. Belirli Süreli İş Sözleşmesi"></div>
        <div class="fld"><label>Kategori</label><select id="s_kat">${SABLON_KAT.map(k=>`<option ${s.kategori===k?'selected':''}>${k}</option>`).join('')}</select></div>
        <div class="fld"><label>Rol / Departman</label><select id="s_rol"><option ${!s.rol||s.rol==='Genel'?'selected':''}>Genel</option>${DEPARTMANLAR.map(d=>`<option ${s.rol===d?'selected':''}>${d}</option>`).join('')}</select></div>
      </div>
      <div class="fld"><label>İçerik (metni düzenleyin, alan eklemek için aşağıdaki butonlara basın)</label>
        <div class="mergebar">${merge}</div>
        <textarea id="s_icerik" class="code">${esc(s.icerik||'')}</textarea>
        <div class="helptext">Alanlar <code>{{ad_soyad}}</code> biçiminde yazılır; oluştururken personel bilgisiyle otomatik dolar.</div>
      </div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Vazgeç</button><button class="btn btn-pri" onclick="saveSablon()">Kaydet</button></div>
  </div></div>`;
  setTimeout(()=>document.getElementById('s_ad').focus(),30);
}
function insertMerge(k){const ta=document.getElementById('s_icerik');const t='{{'+k+'}}';const st=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.slice(0,st)+t+ta.value.slice(en);ta.focus();ta.selectionStart=ta.selectionEnd=st+t.length;}
function saveSablon(){
  const g=id=>document.getElementById(id).value;
  const o={ad:g('s_ad').trim(),kategori:g('s_kat'),rol:g('s_rol'),icerik:g('s_icerik')};
  if(!o.ad){toast('Şablon adı gerekli');return}
  if(editId)Object.assign(DB.sablonlar.find(x=>x.id===editId),o);else DB.sablonlar.push({id:uid('s'),...o});
  saveDB();closeModal();render();toast('Şablon kaydedildi');
}
function dupSablon(id){const s=DB.sablonlar.find(x=>x.id===id);if(!s)return;DB.sablonlar.push({...s,id:uid('s'),ad:s.ad+' (kopya)'});saveDB();render();toast('Kopyalandı');}
function delSablon(id){const s=DB.sablonlar.find(x=>x.id===id);if(!s)return;if(!confirm('"'+s.ad+'" şablonu silinsin mi?'))return;DB.sablonlar=DB.sablonlar.filter(x=>x.id!==id);saveDB();render();toast('Silindi');}

function mergeVal(p,k,extra){if(extra&&extra[k]!=null&&extra[k]!=='')return extra[k];const m={ad_soyad:p.ad,tc:p.tc,departman:p.departman,gorev:p.gorev,ise_giris:fmtDate(p.iseGiris),telefon:p.telefon,adres:p.adres,dogum:fmtDate(p.dogum),ucret:p.ucret,iban:p.iban,bugun:fmtDate(todayISO())};return m[k]!=null?m[k]:'';}
function fillTemplate(icerik,p,extra){return String(icerik||'').replace(/\{\{(\w+)\}\}/g,(m,k)=>esc(mergeVal(p,k,extra)||'__________'));}
// personel satırından: şablon seç
function olusturFor(pid){
  const p=DB.personeller.find(x=>x.id===pid);if(!p)return;
  if(!DB.sablonlar.length){toast('Önce şablon ekleyin');go('sablon');return;}
  pickSablon(s=>printFilled([{p,s}]),'Hangi şablon? — '+p.ad);
}
// şablon kartından: personel seç (tekli/çoklu)
function olusturFromSablon(sid){
  const s=DB.sablonlar.find(x=>x.id===sid);if(!s)return;
  if(!DB.personeller.length){toast('Önce personel ekleyin');go('personel');return;}
  pickPersonel(ids=>printFilled(ids.map(id=>({p:DB.personeller.find(x=>x.id===id),s}))),'"'+s.ad+'" — personel seç');
}
function pickSablon(cb,title){
  const opts=DB.sablonlar.map(s=>`<option value="${s.id}">${esc(s.ad)} · ${esc(s.rol||'Genel')}</option>`).join('');
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-hd"><h3>${esc(title)}</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd"><div class="fld"><label>Şablon</label><select id="pick_s">${opts}</select></div></div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Vazgeç</button><button class="btn btn-pri" id="pickBtn">Oluştur & Yazdır</button></div></div></div>`;
  document.getElementById('pickBtn').onclick=()=>{const id=document.getElementById('pick_s').value;closeModal();cb(id);};
}
function pickPersonel(cb,title){
  const rows=DB.personeller.map(p=>`<label style="display:flex;align-items:center;gap:9px;padding:7px 4px;border-bottom:1px solid var(--slate-100);font-size:13px"><input type="checkbox" value="${p.id}" style="width:16px;height:16px"> <b>${esc(p.ad)}</b> <span style="color:var(--slate-500)">${esc(p.gorev||'')} · ${esc(p.departman||'')}</span></label>`).join('');
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-hd"><h3>${esc(title)}</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd"><div style="font-size:11.5px;color:var(--slate-500);margin-bottom:8px">Birden çok seçip toplu oluşturabilirsiniz.</div><div id="pickList">${rows}</div></div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Vazgeç</button><button class="btn btn-pri" id="pickBtn2">Oluştur & Yazdır</button></div></div></div>`;
  document.getElementById('pickBtn2').onclick=()=>{const ids=[...document.querySelectorAll('#pickList input:checked')].map(c=>c.value);if(!ids.length){toast('En az bir personel seçin');return;}closeModal();cb(ids);};
}
function printFilled(pairs){
  const pages=pairs.filter(x=>x.p&&x.s).map(({p,s,extra})=>`<section class="doc"><div class="lh"><img src="${location.origin}/rota-smi.png" onerror="this.style.display='none'"><div class="lhx"><div class="lhc">ROTA SMI TARIM</div><div class="lhd">${esc(s.ad)}</div></div></div><pre>${fillTemplate(s.icerik,p,extra)}</pre></section>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><title>Belge</title><style>
    @page{size:A4;margin:18mm}body{font-family:'Times New Roman',Georgia,serif;color:#111;font-size:13px;line-height:1.6}
    .doc{page-break-after:always;padding:0 0 10mm}.doc:last-child{page-break-after:auto}
    .lh{display:flex;align-items:center;gap:14px;border-bottom:2px solid #0C2340;padding-bottom:10px;margin-bottom:18px}
    .lh img{height:34px}.lhc{font-weight:800;font-size:15px;color:#0C2340;letter-spacing:.04em}.lhd{font-size:12px;color:#555}
    pre{white-space:pre-wrap;font-family:inherit;font-size:13px;margin:0}
    @media print{.noprint{display:none}}
    .noprint{position:fixed;top:10px;right:10px}.noprint button{padding:8px 16px;font:600 13px sans-serif;background:#1D62A8;color:#fff;border:none;border-radius:7px;cursor:pointer}
  </style></head><body><div class="noprint"><button onclick="window.print()">Yazdır / PDF</button></div>${pages}<scr`+`ipt>window.onload=function(){setTimeout(function(){window.print()},350)}</scr`+`ipt></body></html>`);
  w.document.close();
}

// ============ BELGE ARŞİVİ (ilan/basvuru/kabul/cikis/talimat/diger) ============
function pdfBtn(link){const u=safeLink(link);return u?`<a class="pdfbtn" href="${esc(u)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>Aç</a>`:'<span style="color:var(--slate-400);font-size:11px">link yok</span>'}
function renderBelge(bolum){
  const cfg=BELGE_BOLUM[bolum];const list=DB.belgeler.filter(b=>b.bolum===bolum);
  let h=`<p class="intro">${cfg.intro}</p>`;
  if(bolum==='kabul')h+=waPanel(list);
  if(bolum==='cikis')h+=ihbarPanel();
  h+=`<div class="card"><div class="card-hd"><h3>${cfg.title}</h3><span class="hint">${list.length} belge</span></div>`;
  if(!list.length){h+=`<div class="empty">Henüz belge yok. Sağ üstten <b>+ Belge / Şablon</b> ekleyin.<br><span style="font-size:11.5px">Şablonu Drive'a yükleyip paylaşım linkini yapıştırın.</span></div></div>`;document.getElementById('content').innerHTML=h;return;}
  h+=`<div class="tbl-scroll"><table class="t"><thead><tr><th>Başlık</th><th>Açıklama</th><th>Tarih</th><th>PDF</th><th></th></tr></thead><tbody>`;
  [...list].sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||'')).forEach(b=>{h+=`<tr>
    <td><b>${esc(b.baslik||'—')}</b></td><td style="color:var(--slate-600)">${esc(b.aciklama||'')}</td>
    <td class="num">${b.tarih?fmtDate(b.tarih):'—'}</td><td>${pdfBtn(b.link)}</td>
    <td><div class="rowact"><button class="iconbtn" onclick="openBelge('${bolum}','${b.id}')" title="Düzenle"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg></button><button class="iconbtn del" onclick="delBelge('${b.id}')" title="Sil"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button></div></td></tr>`;});
  h+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=h;
}
function openBelge(bolum,id){
  const b=id?DB.belgeler.find(x=>x.id===id):{bolum,baslik:'',aciklama:'',link:'',tarih:todayISO()};
  if(!b)return;editId=id||null;
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-hd"><h3>${id?'Belge Düzenle':'Yeni Belge / Şablon'}</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd">
      <div class="fld"><label>Başlık</label><input id="b_baslik" value="${esc(b.baslik||'')}" placeholder="Örn. İş Başvuru Formu"></div>
      <div class="fld"><label>Açıklama</label><input id="b_aciklama" value="${esc(b.aciklama||'')}" placeholder="İsteğe bağlı"></div>
      <div class="fld-row"><div class="fld"><label>PDF Linki (Drive vb.)</label><input id="b_link" value="${esc(b.link||'')}" placeholder="https://drive.google.com/..."></div><div class="fld"><label>Tarih</label><input type="date" id="b_tarih" value="${esc(b.tarih||todayISO())}"></div></div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Vazgeç</button><button class="btn btn-pri" onclick="saveBelge('${bolum}')">Kaydet</button></div>
  </div></div>`;
  setTimeout(()=>document.getElementById('b_baslik').focus(),30);

function saveBelge(bolum){
  const g=id=>document.getElementById(id).value.trim();
  const o={bolum,baslik:g('b_baslik'),aciklama:g('b_aciklama'),link:safeLink(g('b_link')),tarih:g('b_tarih')};
  if(!o.baslik&&!o.link){toast('Başlık veya link girin');return}
  if(editId)Object.assign(DB.belgeler.find(x=>x.id===editId),o);else DB.belgeler.push({id:uid('b'),...o});
  saveDB();closeModal();render();toast('Belge kaydedildi');
}
function delBelge(id){const b=DB.belgeler.find(x=>x.id===id);if(!b)return;if(!confirm('"'+(b.baslik||'')+'" silinsin mi?'))return;DB.belgeler=DB.belgeler.filter(x=>x.id!==id);saveDB();render();toast('Silindi');}

// ---- İhbar süresi hesaplama ----
function ihbarPanel(){
  return `<div class="card" style="border-color:var(--blue-200)"><div class="card-hd" style="background:var(--blue-50)"><h3>⏱ İhbar Süresi Hesaplama & İhbar Yazısı</h3><span class="hint">4857/17 · md.27 iş arama izni</span></div>
    <div style="padding:14px 18px;font-size:12.5px;color:var(--slate-600)">Personel ve fesih bildirim tarihini girin; kıdeme göre <b>ihbar süresi</b>, <b>sözleşmenin sona erme tarihi</b> ve <b>iş arama izni</b> otomatik hesaplanır. İşçi/işveren feshine göre ihbar yazısını oluşturup yazdırın.
      <div style="margin-top:12px"><button class="btn btn-pri" onclick="openIhbarHesap()"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> İhbar Süresi Hesapla / Yazı Oluştur</button></div>
    </div></div>`;
}
function openIhbarHesap(pid){
  if(!DB.personeller.length){toast('Önce personel ekleyin');go('personel');return;}
  const pOpts=DB.personeller.map(p=>`<option value="${p.id}" ${pid===p.id?'selected':''}>${esc(p.ad)}${p.iseGiris?'':' — işe giriş yok'}</option>`).join('');
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-hd"><h3>İhbar Süresi Hesaplama</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd">
      <div class="fld-row3">
        <div class="fld"><label>Personel</label><select id="ihbar_pers" onchange="ihbarHesapGoster()">${pOpts}</select></div>
        <div class="fld"><label>Fesih Bildirim Tarihi</label><input type="date" id="ihbar_tarih" value="${todayISO()}" onchange="ihbarHesapGoster()"></div>
        <div class="fld"><label>Fesih Eden</label><select id="ihbar_eden"><option value="isveren">İşveren</option><option value="isci">İşçi</option></select></div>
      </div>
      <div id="ihbar_sonuc" style="margin-top:6px"></div>
      <div class="helptext" style="margin-top:10px">4857/17: 6 aydan az 2 hafta · 6 ay–1,5 yıl 4 hafta · 1,5–3 yıl 6 hafta · 3 yıl+ 8 hafta. İş arama izni md.27: işgünü başına 2 saat (hafta içi günler).</div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Kapat</button><button class="btn btn-pri" onclick="ihbarYaziOlustur()">İhbar Yazısı Oluştur & Yazdır</button></div>
  </div></div>`;
  ihbarHesapGoster();
}
function ihbarHesapGoster(){
  const p=DB.personeller.find(x=>x.id===document.getElementById('ihbar_pers').value);

// ============ İZİN & AVANS (iskelet) ============
function yilSecenekleri(sel){sel=sel||izinYil;const c=new Date().getFullYear();let o='';for(let y=c+1;y>=c-4;y--)o+=`<option value="${y}" ${y===sel?'selected':''}>${y}</option>`;return o;}
function getBakiye(pid,yil){const b=(DB.izinBakiye||[]).find(x=>x.personelId===pid&&+x.yil===+yil);return b||{personelId:pid,yil,devir:0,hakEdilen:''};}
function izinKayitlari(pid,yil){return DB.izinler.filter(z=>z.personelId===pid&&(yil==null||(z.baslangic||'').slice(0,4)===String(yil)));}
function izinStat(p,yil){
  const kayit=izinKayitlari(p.id,yil);
  const sum=(pred,birim)=>kayit.filter(pred).reduce((s,z)=>s+(+(birim==='saat'?z.saat:z.gun)||0),0);
  const yillikKullanilan=sum(z=>z.tur==='yillik','gün');
  const ucretsizGun=sum(z=>z.tur==='ucretsiz','gün');
  const ucretsizSaat=sum(z=>z.tur==='ucretsiz_saat','saat');
  const mazeretGun=sum(z=>izinTur(z.tur).mazeret,'gün');
  const serbestSaat=sum(z=>z.tur==='serbest_zaman','saat');
  const raporGun=sum(z=>z.tur==='raporlu','gün');
  const bk=getBakiye(p.id,yil);
  const devir=+bk.devir||0;
  const hak=(bk.hakEdilen!==''&&bk.hakEdilen!=null)?+bk.hakEdilen:yillikHakGun(p.iseGiris,p.dogum,yil+'-12-31');
  const hakOto=(bk.hakEdilen===''||bk.hakEdilen==null);
  const kalan=devir+hak-yillikKullanilan;
  return {yillikKullanilan,ucretsizGun,ucretsizSaat,mazeretGun,serbestSaat,raporGun,devir,hak,hakOto,kalan,kayit};
}
function renderIzin(){
  const aktif=DB.personeller.filter(p=>p.durum!=='ayrildi');
  let topYillik=0,topUcGun=0,topUcSaat=0,topMazeret=0,topKalan=0;
  aktif.forEach(p=>{const s=izinStat(p,izinYil);topYillik+=s.yillikKullanilan;topUcGun+=s.ucretsizGun;topUcSaat+=s.ucretsizSaat;topMazeret+=s.mazeretGun;topKalan+=s.kalan;});
  let h=`<p class="intro">Yıllık izin bakiyelerini (devir + hak ediş) girin; kullanılan/kalan otomatik hesaplanır. Diğer izin türlerini kaydedin, personel bazında yıl içi istatistikleri görün. Hak ediş boş bırakılırsa işe giriş tarihine göre (4857/53) otomatik önerilir.</p>`;
  h+=`<div class="kpis">
    <div class="kpi"><div class="kl">Kullanılan Yıllık (${izinYil})</div><div class="kv">${topYillik}<span style="font-size:13px;color:var(--slate-400)"> gün</span></div><div class="ks">tüm aktif personel</div></div>
    <div class="kpi g"><div class="kl">Toplam Kalan Yıllık</div><div class="kv">${topKalan}<span style="font-size:13px;color:var(--slate-400)"> gün</span></div><div class="ks">devir + hak − kullanılan</div></div>
    <div class="kpi a"><div class="kl">Ücretsiz İzin (Yıl)</div><div class="kv">${topUcGun}<span style="font-size:12px;color:var(--slate-400)"> gün</span> ${topUcSaat?`<span style="font-size:13px">+${topUcSaat}s</span>`:''}</div><div class="ks">yıl içi toplam</div></div>
    <div class="kpi p"><div class="kl">Mazeret İzni (Yıl)</div><div class="kv">${topMazeret}<span style="font-size:13px;color:var(--slate-400)"> gün</span></div><div class="ks">evlilik/ölüm/babalık</div></div>
  </div>`;
  h+=`<div class="card"><div class="card-hd"><h3>Personel Bazında İzin Durumu · ${izinYil}</h3><span class="hint">satıra tıkla → detay & dilekçeler</span></div>`;
  if(!aktif.length){h+=`<div class="empty">Aktif personel yok. Önce <b>Personeller</b> bölümünden personel ekleyin.</div></div>`;document.getElementById('content').innerHTML=h;return;}
  h+=`<div class="tbl-scroll"><table class="t"><thead><tr><th>Personel</th><th>Departman</th><th class="num">Devir</th><th class="num">Hak Ediş</th><th class="num">Kullanılan</th><th class="num">Kalan</th><th class="num">Ücretsiz</th><th class="num">Mazeret</th><th></th></tr></thead><tbody>`;
  [...aktif].sort((a,b)=>(a.ad||'').localeCompare(b.ad||'','tr')).forEach(p=>{
    const s=izinStat(p,izinYil);
    const kalanRenk=s.kalan<0?'color:var(--red-700)':s.kalan<=2?'color:var(--amber-700)':'color:var(--green-700)';
    h+=`<tr style="cursor:pointer" onclick="izinDetay('${p.id}')">
      <td><b>${esc(p.ad)}</b>${p.iseGiris?`<div style="font-size:10.5px;color:var(--slate-400)">Giriş: ${fmtDate(p.iseGiris)}</div>`:''}</td>
      <td>${deptTag(p.departman)}</td>
      <td class="num">${s.devir||0}</td>
      <td class="num">${s.hak}${s.hakOto?'<span style="font-size:9px;color:var(--blue-500)"> oto</span>':''}</td>
      <td class="num">${s.yillikKullanilan}</td>
      <td class="num" style="font-weight:700;${kalanRenk}">${s.kalan}</td>
      <td class="num">${s.ucretsizGun?s.ucretsizGun+'g':''}${s.ucretsizSaat?(s.ucretsizGun?' ':'')+s.ucretsizSaat+'s':''}${!s.ucretsizGun&&!s.ucretsizSaat?'—':''}</td>
      <td class="num">${s.mazeretGun||'—'}</td>
      <td onclick="event.stopPropagation()"><div class="rowact">
        <button class="iconbtn" title="Bakiye düzenle" onclick="openBakiye('${p.id}')"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg></button>
      </div></td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=h;
}
function openBakiye(pid){
  const p=DB.personeller.find(x=>x.id===pid);if(!p)return;
  const bk=getBakiye(pid,izinYil);
  const oto=yillikHakGun(p.iseGiris,p.dogum,izinYil+'-12-31');
  const nx=sonrakiHakEdis(p.iseGiris,p.dogum);
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-hd"><h3>Yıllık İzin Bakiyesi — ${esc(p.ad)} · ${izinYil}</h3><button class="xbtn" onclick="closeModal()">×</button></div>

      </div>
      <div class="helptext">Hak ediş boş bırakılırsa işe giriş kıdemine göre <b>${oto} gün</b> kabul edilir (4857/53).${nx?` Bir sonraki hak ediş: <b>${fmtDate(nx.tarih)}</b> · <b>${nx.gun} gün</b>.`:''}</div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Vazgeç</button><button class="btn btn-pri" onclick="saveBakiye('${pid}')">Kaydet</button></div>
  </div></div>`;
}
function saveBakiye(pid){
  DB.izinBakiye=DB.izinBakiye||[];
  const devir=+document.getElementById('bk_devir').value||0;
  const hakRaw=document.getElementById('bk_hak').value.trim();

  b.devir=devir;b.hakEdilen=hakRaw===''?'':+hakRaw;
  saveDB();closeModal();render();toast('Bakiye kaydedildi');
}

function fmtTL(n){n=+n||0;return '₺'+n.toLocaleString('tr-TR',{maximumFractionDigits:0})}
function curYM(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function ymAdd(ym,n){let a=String(ym).split('-').map(Number);let y=a[0],m=a[1]-1+n;y+=Math.floor(m/12);m=((m%12)+12)%12;return y+'-'+String(m+1).padStart(2,'0')}
function fmtYM(ym){if(!ym)return '';const a=String(ym).split('-').map(Number);return (AY_ADLARI[a[1]-1]||'')+' '+a[0]}
function avansAylik(a){const t=Math.max(1,+a.taksit||1);return Math.round((+a.tutar||0)/t)}
function avansAylar(a){const t=Math.max(1,+a.taksit||1);const out=[];if(!a.baslangicAy)return out;for(let i=0;i<t;i++)out.push(ymAdd(a.baslangicAy,i));return out}
function avansKesilen(a,ref){ref=ref||curYM();const aylar=avansAylar(a).filter(ym=>ym<=ref);return Math.min(+a.tutar||0,aylar.length*avansAylik(a))}
function avansKalan(a){return Math.max(0,(+a.tutar||0)-avansKesilen(a))}
function avansBuAy(a){return avansAylar(a).includes(curYM())?Math.min(avansAylik(a),avansKalan(a)+avansAylik(a)):0}

function tazminatHesap(p,refISO){
  const ay=DB.tazminatAyar;const ref=refISO||todayISO();
  const brut=+p.ucret||0;const gunluk=brut/30;
  const d1=parseISO(p.iseGiris),d2=parseISO(ref);
  const toplamGun=(d1&&d2)?Math.max(0,Math.round((d2-d1)/864e5)):0;
  const yilKesir=toplamGun/365;
  let kidemBrut=0,tavanU=false;
  if(toplamGun>=365){let yillik=brut;if(brut>ay.kidemTavan){yillik=ay.kidemTavan;tavanU=true;}kidemBrut=yillik*yilKesir;}
  const kidemDamga=kidemBrut*ay.damgaOran;const kidemNet=kidemBrut-kidemDamga;
  const ih=ihbarHesapla(p.iseGiris,ref);
  const ihbarBrut=gunluk*ih.ihbarGun;const ihbarGelir=ihbarBrut*ay.gelirVergisiOran;const ihbarDamga=ihbarBrut*ay.damgaOran;const ihbarNet=ihbarBrut-ihbarGelir-ihbarDamga;
  return {brut,gunluk,toplamGun,yilKesir,kidemBrut,kidemDamga,kidemNet,tavanU,kidemHak:toplamGun>=365,ihbarHafta:ih.hafta,ihbarGun:ih.ihbarGun,ihbarBrut,ihbarGelir,ihbarDamga,ihbarNet,toplamBrut:kidemBrut+ihbarBrut,toplamNet:kidemNet+ihbarNet,kidemMetin:kidemMetin(p.iseGiris,ref)};
}

  // büyük yükümlülük banner
  h+=`<div class="card" style="background:linear-gradient(135deg,var(--blue-900),var(--blue-700));border:none;color:#fff"><div style="padding:18px 22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <div><div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9fc0e6">Toplam Tazminat Yükümlülüğü (${fmtDate(ref)})</div>
    <div style="font-size:30px;font-weight:800;margin-top:5px">${fmtTL(kidemNet+ihbarNet)} <span style="font-size:14px;font-weight:600;color:#9fc0e6">net</span></div>
    <div style="font-size:13px;color:#cdddf0;margin-top:3px">Brüt: ${fmtTL(kidemBrut+ihbarBrut)} · ${aktif.length} aktif personel</div></div>

  h+=`<div class="kpis">
    <div class="kpi"><div class="kl">Kıdem Tazminatı</div><div class="kv">${fmtTL(kidemNet)}</div><div class="ks">net · brüt ${fmtTL(kidemBrut)}</div></div>
    <div class="kpi a"><div class="kl">İhbar Tazminatı</div><div class="kv">${fmtTL(ihbarNet)}</div><div class="ks">net · brüt ${fmtTL(ihbarBrut)}</div></div>
    <div class="kpi g"><div class="kl">Genel Toplam (Net)</div><div class="kv">${fmtTL(kidemNet+ihbarNet)}</div><div class="ks">ödenecek tahmini</div></div>

  h+=`<div class="card"><div class="card-hd"><h3>Personel Bazında Tazminat · ${fmtDate(ref)}</h3><span class="hint">satıra tıkla → detay & ödeme</span></div>`;

  rows.sort((a,b)=>b.h.toplamNet-a.h.toplamNet).forEach(({p,h:x,od})=>{
    h+=`<tr style="cursor:pointer" onclick="tazminatDetay('${p.id}')">
      <td><b>${esc(p.ad)}</b>${od.kidem||od.ihbar?`<div style="font-size:10px;color:var(--green-700)">ödenen: ${fmtTL(od.kidem+od.ihbar)}</div>`:''}</td>
      <td>${p.iseGiris?fmtDate(p.iseGiris):'<span style="color:var(--red-700)">giriş yok</span>'}<div style="font-size:10.5px;color:var(--slate-400)">${x.kidemMetin}</div></td>
      <td class="num">${+p.ucret>0?fmtTL(p.ucret):'<span style="color:var(--amber-700)">—</span>'}</td>
      <td class="num">${x.kidemHak?`<b>${fmtTL(x.kidemNet)}</b><div style="font-size:10px;color:var(--slate-400)">brüt ${fmtTL(x.kidemBrut)}${x.tavanU?' · tavan':''}</div>`:'<span style="color:var(--slate-400)">1 yıl yok</span>'}</td>
      <td class="num"><b>${fmtTL(x.ihbarNet)}</b><div style="font-size:10px;color:var(--slate-400)">${x.ihbarHafta} hf · brüt ${fmtTL(x.ihbarBrut)}</div></td>
      <td class="num" style="font-weight:700;color:var(--blue-800)">${fmtTL(x.toplamNet)}</td>
      <td onclick="event.stopPropagation()"><div class="rowact">
        <button class="iconbtn" title="Brüt ücret güncelle" onclick="tazBrut('${p.id}')"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg></button>
      </div></td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=h;
}
function tazBrut(pid){const p=DB.personeller.find(x=>x.id===pid);if(!p)return;const v=prompt('Aylık giydirilmiş brüt ücret (TL) — '+p.ad+'\n(Kıdem & ihbar tazminatı bu tutardan hesaplanır)',p.ucret||'');if(v==null)return;p.ucret=parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0;saveDB();render();toast('Brüt ücret güncellendi');}
function tazminatDetay(pid){

  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal lg">
    <div class="modal-hd"><h3>${esc(p.ad)} — Tazminat Detayı · ${fmtDate(ref)}</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div><div style="font-size:12px;font-weight:700;color:var(--blue-800);margin-bottom:6px">KIDEM TAZMİNATI</div>
          <table class="t" style="min-width:0"><tbody>
            ${sat('Kıdem süresi',x.kidemMetin+' ('+x.toplamGun+' gün)')}
            ${sat('Brüt ücret (aylık)',fmtTL(x.brut))}
            ${x.tavanU?sat('Kıdem tavanı','<span style=\"color:var(--amber-700)\">'+fmtTL(DB.tazminatAyar.kidemTavan)+' uygulandı</span>'):''}
            ${sat('Kıdem tazminatı (brüt)',x.kidemHak?fmtTL(x.kidemBrut):'1 yıl dolmadı — yok')}
            ${sat('− Damga vergisi (‰'+(DB.tazminatAyar.damgaOran*1000).toFixed(2)+')','−'+fmtTL(x.kidemDamga))}
            ${sat('<b>Net kıdem tazminatı</b>','<b style=\"color:var(--green-700)\">'+fmtTL(x.kidemNet)+'</b>')}
          </tbody></table></div>
        <div><div style="font-size:12px;font-weight:700;color:var(--amber-700);margin-bottom:6px">İHBAR TAZMİNATI</div>
          <table class="t" style="min-width:0"><tbody>
            ${sat('İhbar süresi',x.ihbarHafta+' hafta ('+x.ihbarGun+' gün)')}
            ${sat('Günlük brüt',fmtTL(x.gunluk))}
            ${sat('İhbar tazminatı (brüt)',fmtTL(x.ihbarBrut))}
            ${sat('− Gelir vergisi (%'+(DB.tazminatAyar.gelirVergisiOran*100)+')','−'+fmtTL(x.ihbarGelir))}
            ${sat('− Damga vergisi','−'+fmtTL(x.ihbarDamga))}
            ${sat('<b>Net ihbar tazminatı</b>','<b style=\"color:var(--green-700)\">'+fmtTL(x.ihbarNet)+'</b>')}
          </tbody></table></div>
      </div>
      <div style="background:var(--blue-50);border:1px solid var(--blue-200);border-radius:10px;padding:13px 16px;margin:14px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--slate-500)">Toplam Net Tazminat</div><div style="font-size:22px;font-weight:800;color:var(--blue-900)">${fmtTL(x.toplamNet)}</div><div style="font-size:11px;color:var(--slate-500)">Brüt: ${fmtTL(x.toplamBrut)}${od.kidem||od.ihbar?` · Ödenen: ${fmtTL(od.kidem+od.ihbar)}`:''}</div></div>
        <button class="btn btn-pri" onclick="openTazOdeme('${pid}')">Ödeme Kaydet</button>

  </div></div>`;
}
function openTazOdeme(pid){

  const x=tazminatHesap(p,tazminatTarih||todayISO());

}
function saveTazOdeme(pid){
  const o={id:uid('to'),personelId:pid,tarih:document.getElementById('to_tarih').value,kidem:+document.getElementById('to_kidem').value||0,ihbar:+document.getElementById('to_ihbar').value||0,aciklama:document.getElementById('to_acik').value.trim()};

function delTazOdeme(id){const o=DB.tazminatOdeme.find(x=>x.id===id);if(!o)return;if(!confirm('Bu ödeme kaydı silinsin mi?'))return;DB.tazminatOdeme=DB.tazminatOdeme.filter(x=>x.id!==id);saveDB();tazminatDetay(o.personelId);render();toast('Silindi');}
function openTazminatAyar(){

  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-hd"><h3>Tazminat Hesaplama Ayarları</h3><button class="xbtn" onclick="closeModal()">×</button></div>

      <div class="helptext">Kıdem tazminatından yalnızca damga vergisi kesilir; SGK ve gelir vergisi kesilmez. İhbar tazminatı ücret sayılır: gelir vergisi (kümülatif dilime göre değişir; buradaki oran tahminidir) + damga vergisi kesilir.</div>

// ============ PUANTAJ ============
function pzCls(k){const s=PZ_STATUS.find(x=>x.k===k);return s?s.cls:'E'}
function pzAyBilgi(ym){const a=String(ym).split('-').map(Number);return {y:a[0],m:a[1],gun:new Date(a[0],a[1],0).getDate(),adi:AY_ADLARI[a[1]-1]}}
function pzGunAdi(y,m,d){return ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'][new Date(y,m-1,d).getDay()]}
function pzWeekend(y,m,d){const g=new Date(y,m-1,d).getDay();return g===0||g===6}
function pzResmi(m,d){return PZ_RESMI[String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')]}
function pzData(){DB.puantaj=DB.puantaj||{};if(!DB.puantaj[puantajAy])DB.puantaj[puantajAy]={rows:{}};return DB.puantaj[puantajAy]}
function pzInitRow(info){const g={};for(let d=1;d<=info.gun;d++)g[d]=pzResmi(info.m,d)?'GT':(pzWeekend(info.y,info.m,d)?'HT':'X');return {gunler:g,fin:{}}}
function pzRow(pid,info){const data=pzData();if(!data.rows[pid])data.rows[pid]=pzInitRow(info);const r=data.rows[pid];r.gunler=r.gunler||{};r.fin=r.fin||{};return r}
function pzAvansAy(pid,ym){return DB.avanslar.filter(a=>a.personelId===pid&&avansAylar(a).includes(ym)).reduce((s,a)=>s+avansAylik(a),0)}
function pzSet(pid,d){const info=pzAyBilgi(puantajAy);const r=pzRow(pid,info);r.gunler[d]=pzBrush;saveDB();renderPuantaj();}
function pzSayim(r,info){const c={};PZ_STATUS.forEach(s=>c[s.k]=0);for(let d=1;d<=info.gun;d++){const k=r.gunler[d]||'';c[k]=(c[k]||0)+1;}return c}
function renderPuantaj(){
  const info=pzAyBilgi(puantajAy);
  const aktif=DB.personeller.filter(p=>p.durum!=='ayrildi');
  let h=`<p class="intro">Aylık puantaj — bordro için. Hafta sonu (HT) ve resmi tatiller (GT) otomatik işaretlenir. Önce alttan bir <b>durum seçin</b>, sonra hücrelere tıklayarak boyayın. Avans kolonu Avans modülünden gelir. Sağ üstten <b>Excel indirin</b>, ay seçiciyle geçmiş ayları görün.</p>`;
  // boya paleti
  h+=`<div class="brush"><span class="bl">Boya:</span>${PZ_STATUS.map(s=>`<button class="pz-${s.cls} ${pzBrush===s.k?'on':''}" onclick="pzBrush='${s.k}';renderPuantaj()">${s.k||'·'} ${s.l}</button>`).join('')}</div>`;
  if(!aktif.length){document.getElementById('content').innerHTML=h+`<div class="card"><div class="empty">Aktif personel yok. Önce <b>Personeller</b> ekleyin.</div></div>`;return;}
  // tablo
  let head1=`<th class="nm">#  Adı Soyadı</th><th>Dep.</th>`;
  let head2=`<th class="nm"></th><th></th>`;
  for(let d=1;d<=info.gun;d++){const we=pzWeekend(info.y,info.m,d),rt=pzResmi(info.m,d);head1+=`<th title="${rt||''}" style="${rt?'color:var(--purple)':we?'color:var(--slate-400)':''}">${d}</th>`;head2+=`<th style="font-weight:600;color:var(--slate-400)">${pzGunAdi(info.y,info.m,d)}</th>`;}
  head1+=`<th class="sum">Çalış.</th><th class="sum">Yİ</th><th class="sum">R</th><th class="sum">Üİ</th><th class="sum">HT</th><th class="sum">GT</th><th>₺</th>`;
  head2+=`<th class="sum" colspan="7"></th>`;
  let body='';
  aktif.forEach((p,i)=>{
    const r=pzRow(p.id,info);const c=pzSayim(r,info);
    let cells='';
    for(let d=1;d<=info.gun;d++){const k=r.gunler[d]||'';const we=pzWeekend(info.y,info.m,d);cells+=`<td class="day pz-${pzCls(k)} ${we?'wend':''}" onclick="pzSet('${p.id}',${d})">${k}</td>`;}
    body+=`<tr><td class="nm">${i+1}. ${esc(p.ad)}</td><td>${esc(p.departman||'')}</td>${cells}<td class="sum">${c['X']||0}</td><td class="sum">${c['Yİ']||0}</td><td class="sum">${c['R']||0}</td><td class="sum">${c['Üİ']||0}</td><td class="sum">${c['HT']||0}</td><td class="sum">${c['GT']||0}</td><td><button class="iconbtn" title="Mali bilgiler" onclick="openPzFin('${p.id}')"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></button></td></tr>`;
  });
  h+=`<div class="card" style="padding:0;border:none;background:none"><div class="pz-scroll"><table class="pz"><thead><tr>${head1}</tr><tr>${head2}</tr></thead><tbody>${body}</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=h;
}
function openPzFin(pid){
  const p=DB.personeller.find(x=>x.id===pid);if(!p)return;
  const info=pzAyBilgi(puantajAy);const r=pzRow(pid,info);const f=r.fin;
  const avansOto=pzAvansAy(pid,puantajAy);
  const num=(id,lbl,val,ph)=>`<div class="fld"><label>${lbl}</label><input type="number" id="${id}" value="${val!=null&&val!==''?val:''}" placeholder="${ph||''}"></div>`;
  document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal lg">
    <div class="modal-hd"><h3>${esc(p.ad)} — Mali Bilgiler · ${info.adi} ${info.y}</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="modal-bd">
      <div class="fld-row3">${num('f_belir','Belirlenen Maaş (brüt)',f.belirlenenMaas!=null&&f.belirlenenMaas!==''?f.belirlenenMaas:(p.ucret||''),'')}${num('f_net','Maaş (Net)',f.maasNet,'')}${num('f_aile','Aile Yardımı',f.aileYardim,'')}</div>
      <div class="fld-row3">${num('f_cocuk','Çocuk Yardımı',f.cocukYardim,'')}${num('f_prim','Prim',f.prim,'')}${num('f_harc','Harcırah',f.harcirah,'')}</div>
      <div class="fld-row3">${num('f_avans','Avans',f.avans!=null&&f.avans!==''?f.avans:'','oto: '+avansOto)}${num('f_fm','Fazla Mesai (saat)',f.fazlaMesai,'')}${num('f_rt','Resmi Tatil Mesai',f.resmiMesai,'')}</div>
      <div class="fld-row">${num('f_icra','İcra',f.icra,'')}<div class="fld"><label>&nbsp;</label><div class="helptext" style="padding-top:9px">Avans boş bırakılırsa Avans modülündeki bu ay kesintisi (<b>${fmtTL(avansOto)}</b>) kullanılır.</div></div></div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeModal()">Vazgeç</button><button class="btn btn-pri" onclick="savePzFin('${pid}')">Kaydet</button></div>
  </div></div>`;
}
function savePzFin(pid){
  const info=pzAyBilgi(puantajAy);const r=pzRow(pid,info);const g=id=>document.getElementById(id).value.trim();
  r.fin={belirlenenMaas:g('f_belir'),maasNet:g('f_net'),aileYardim:g('f_aile'),cocukYardim:g('f_cocuk'),prim:g('f_prim'),harcirah:g('f_harc'),avans:g('f_avans'),fazlaMesai:g('f_fm'),resmiMesai:g('f_rt'),icra:g('f_icra')};
  saveDB();closeModal();renderPuantaj();toast('Mali bilgiler kaydedildi');
}
function pzExcel(){
  if(typeof XLSX==='undefined'){toast('Excel kütüphanesi yüklenemedi');return;}
  const info=pzAyBilgi(puantajAy);const aktif=DB.personeller.filter(p=>p.durum!=='ayrildi');
  const aoa=[];
  aoa.push(['ROTA SMI TARIM — '+info.adi.toUpperCase()+' '+info.y+' AYI PUANTAJ']);
  const h1=['S.No','Departman','Adı Soyadı','Belirlenen Maaş','Maaş (Net)','Aile Yardımı','Çocuk Yardımı','Prim','Harcırah','Avans','Fazla Mesai','Resmi Tatil Mesai','İcra'];
  const h2=['','','','','','','','','','','','',''];
  for(let d=1;d<=info.gun;d++){h1.push(d);h2.push(pzGunAdi(info.y,info.m,d).toUpperCase());}
  h1.push('Çalışılan','Yıllık İzin','Raporlu','Ücretsiz','Hafta Tatili','Genel Tatil');
  h2.push('','','','','','');
  aoa.push(h1);aoa.push(h2);
  aktif.forEach((p,i)=>{
    const r=pzRow(p.id,info);const c=pzSayim(r,info);const f=r.fin||{};
    const avans=(f.avans!=null&&f.avans!=='')?f.avans:(pzAvansAy(p.id,puantajAy)||'');
    const row=[i+1,p.departman||'',p.ad,(f.belirlenenMaas!=null&&f.belirlenenMaas!=='')?f.belirlenenMaas:(p.ucret||''),f.maasNet||'',f.aileYardim||'',f.cocukYardim||'',f.prim||'',f.harcirah||'',avans,f.fazlaMesai||'',f.resmiMesai||'',f.icra||''];
    for(let d=1;d<=info.gun;d++)row.push(r.gunler[d]||'');
    row.push(c['X']||0,c['Yİ']||0,c['R']||0,c['Üİ']||0,c['HT']||0,c['GT']||0);
    aoa.push(row);
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:5},{wch:10},{wch:22},{wch:12},{wch:11},{wch:10},{wch:10},{wch:8},{wch:9},{wch:9},{wch:10},{wch:13},{wch:8}].concat(Array.from({length:info.gun},()=>({wch:4}))).concat([{wch:9},{wch:9},{wch:8},{wch:9},{wch:9},{wch:9}]);
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:12}}];

}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyB-eY1jv-HYfrNxzrhWS9sywLBFQarpLD8",authDomain:"rota-yem.firebaseapp.com",projectId:"rota-yem",storageBucket:"rota-yem.firebasestorage.app",messagingSenderId:"186408871052",appId:"1:186408871052:web:65791c132b2c1b525307a9"};
const fbApp=initializeApp(firebaseConfig),fdb=getFirestore(fbApp),dref=doc(fdb,"apps","ik");
function isKey(k){return !!k&&k.indexOf('rota_ik')===0}
function collectLocal(){const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(isKey(k))o[k]=localStorage.getItem(k);}return o;}
let suppress=false,lastUpdated=0,timer=null,hydrated=false;
const _set=localStorage.setItem.bind(localStorage);
localStorage.setItem=function(k,v){_set(k,v);if(!suppress&&isKey(k))schedulePush();};
function schedulePush(){if(!hydrated)return;clearTimeout(timer);timer=setTimeout(push,900);}
async function push(){try{lastUpdated=Date.now();await setDoc(dref,{data:collectLocal(),updated:lastUpdated});fbDot('#16A34A','Senkron');}catch(e){console.warn('ik push',e);fbDot('#EF4444','Hata');}}
function applyRemote(d){suppress=true;try{Object.keys(d||{}).forEach(k=>{if(isKey(k))_set(k,d[k]);});}finally{suppress=false;}}
let dotEl=null;function fbDot(c,t){if(!dotEl){dotEl=document.createElement('div');dotEl.style.cssText='position:fixed;bottom:12px;left:12px;z-index:999;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:4px 10px;font:600 11px Inter,system-ui,sans-serif;color:#475569;box-shadow:0 2px 8px rgba(0,0,0,.1)';document.body.appendChild(dotEl);}dotEl.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${c}"></span> ${t}`;}
(async function(){
  fbDot('#F59E0B','Bağlanıyor');
  try{const snap=await getDoc(dref);
    if(snap.exists()&&snap.data().data){applyRemote(snap.data().data);lastUpdated=snap.data().updated||0;hydrated=true;if(window.__reloadIK)window.__reloadIK();fbDot('#16A34A','Senkron');}
    else{hydrated=true;await push();}
  }catch(e){console.warn('ik init',e);fbDot('#EF4444','Çevrimdışı');}
  try{onSnapshot(dref,(snap)=>{if(!snap.exists())return;const d=snap.data();if(!d||(d.updated&&d.updated===lastUpdated))return;lastUpdated=d.updated||0;hydrated=true;applyRemote(d.data);if(window.__reloadIK)window.__reloadIK();fbDot('#16A34A','Güncellendi');});}catch(e){}
})();
</script>
